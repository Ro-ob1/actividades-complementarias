<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Disciplina</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-dumbbell me-2"></i>
						<span th:text="${disciplina.id != null} ? 'Editar disciplina' : 'Registrar disciplina'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/disciplina/guardar}" method="post" th:object="${disciplina}">
							<input type="hidden" th:field="*{id}">

							<div th:if="${disciplina.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${disciplina.id}" readonly>
							</div>

							<div class="mb-3">
								<label class="form-label">Nombre <span class="text-danger">*</span></label>
								<input type="text" class="form-control" th:field="*{nombre}"
								       placeholder="Ej. Fútbol Varonil"
								       required minlength="2" maxlength="80"
								       pattern="[A-Za-záéíóúÁÉÍÓÚüÜñÑ\s]+"
								       title="Solo letras y espacios"
								       oninput="this.value = capitalizarPalabras(this.value)">
							</div>

							<div class="mb-3">
								<label class="form-label">Créditos <span class="text-danger">*</span></label>
								<input type="number" class="form-control" th:field="*{creditos}"
								       placeholder="1" required min="1" max="5">
								<div class="form-text text-muted" style="font-size:11px;">
									Generalmente 1 crédito por actividad complementaria.
								</div>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/disciplina/disciplinas}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
						<script>
						function capitalizarPalabras(texto) {
						    return texto.replace(/(^|\s)\S/g, c => c.toUpperCase());
						}
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
