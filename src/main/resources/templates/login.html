<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Iniciar sesión — Actividades Complementarias</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	<style>
		body {
			background: var(--tecnm-azul);
			display: flex;
			align-items: center;
			justify-content: center;
			min-height: 100vh;
		}

		.login-card {
			background: #fff;
			border-radius: 12px;
			padding: 2.5rem;
			width: 100%;
			max-width: 380px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, .25);
		}

		.login-logo {
			width: 72px;
			height: 72px;
			border-radius: 50%;
			object-fit: cover;
			border: 3px solid var(--tecnm-azul);
		}

		.login-title {
			font-size: 18px;
			font-weight: 700;
			color: var(--tecnm-azul);
		}

		.login-sub {
			font-size: 12px;
			color: var(--tecnm-gris);
		}

		.btn-login {
			background: var(--tecnm-azul);
			color: #fff;
			border: none;
			width: 100%;
			padding: 10px;
			font-size: 14px;
			font-weight: 600;
			border-radius: 6px;
		}

		.btn-login:hover {
			background: var(--tecnm-azul2);
			color: #fff;
		}
	</style>
</head>

<body>
	<div class="login-card">
		<div class="text-center mb-4">
			<img th:src="@{/images/itch.jpg}" class="login-logo mb-3" onerror="this.style.display='none'">
			<div class="login-title">Actividades Complementarias</div>
			<div class="login-sub">IT Chilpancingo — TecNM</div>
		</div>

		<div th:if="${param.error}" class="alert alert-danger py-2" style="font-size:13px;">
			<i class="fas fa-exclamation-circle me-1"></i> Usuario o contraseña incorrectos.
		</div>
		<div th:if="${param.logout}" class="alert alert-success py-2" style="font-size:13px;">
			<i class="fas fa-check-circle me-1"></i> Sesión cerrada correctamente.
		</div>

		<form th:action="@{/login}" method="post">
			<div class="mb-3">
				<label class="form-label" style="font-size:13px;font-weight:600;color:var(--tecnm-gris);">
					Usuario
				</label>
				<input type="text" name="username" class="form-control" placeholder="Ej. 22520001" autofocus>
			</div>
			<div class="mb-4">
				<label class="form-label" style="font-size:13px;font-weight:600;color:var(--tecnm-gris);">
					Contraseña
				</label>
				<input type="password" name="password" class="form-control" placeholder="••••••••">
			</div>
			<button type="submit" class="btn-login">
				<i class="fas fa-sign-in-alt me-1"></i> Iniciar sesión
			</button>
		</form>

	</div>

	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
