<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<title>Detalle Actividad</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-8">

				<!-- Detalle de la actividad -->
				<div class="card shadow-sm mb-4">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-running me-2"></i>Detalle de actividad</span>
						<a th:href="@{/actividad/actividades}" class="btn btn-light btn-sm">
							<i class="bi bi-arrow-left me-1"></i> Volver
						</a>
					</div>
					<div class="card-body p-4">
						<div class="d-flex align-items-center gap-3 mb-4">
							<img th:src="@{/images/actividad/{img}(img=${actividad.imagenFlyer})}"
								class="img-actividad" style="width:80px;height:80px;"
								onerror="this.src='/images/no-image.jpg'">
							<div>
								<div style="font-size:17px;font-weight:700;" th:text="${actividad.nombre}"></div>
								<div style="font-size:12px;color:var(--tecnm-gris);"
									th:text="${actividad.disciplina.nombre}"></div>
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Descripción</div>
							<div class="detalle-valor" th:text="${actividad.descripcion}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Disciplina</div>
							<div class="detalle-valor" th:text="${actividad.disciplina.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Créditos</div>
							<div class="detalle-valor" th:text="${actividad.disciplina.creditos}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Semestre</div>
							<div class="detalle-valor" th:text="${actividad.semestre.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Instructor</div>
							<div class="detalle-valor"
								th:text="${actividad.instructor.persona.nombre + ' ' + actividad.instructor.persona.apellido}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Cupo máximo</div>
							<div class="detalle-valor" th:text="${actividad.cupoMaximo}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Estatus</div>
							<div class="detalle-valor">
								<span th:if="${actividad.activo == 1}" class="badge text-bg-success">Activa</span>
								<span th:unless="${actividad.activo == 1}" class="badge text-bg-danger">Inactiva</span>
							</div>
						</div>
						<div class="mt-4 d-flex gap-2">
							<a sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_ENCARGADO')"
							   th:href="@{/actividad/editar/{id}(id=${actividad.id})}"
							   class="btn btn-guardar btn-sm">
								<i class="bi bi-pencil me-1"></i> Editar
							</a>
							<a th:href="@{/actividad/actividades}" class="btn btn-outline-secondary btn-sm">
								<i class="bi bi-arrow-left me-1"></i> Regresar
							</a>
						</div>
					</div>
				</div>

				<!-- Horarios de la actividad -->
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-calendar-alt me-2"></i>Horario de la actividad
					</div>
					<div class="card-body">
						<div th:if="${horarios == null or horarios.isEmpty()}"
							class="text-center py-3" style="color:var(--tecnm-gris);">
							<i class="fas fa-calendar-times fa-2x mb-2"></i>
							<p>No hay horarios registrados para esta actividad.</p>
						</div>
						<div class="table-responsive" th:unless="${horarios == null or horarios.isEmpty()}">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>Día</th>
										<th class="text-center">Hora inicio</th>
										<th class="text-center">Hora fin</th>
										<th>Espacio / Lugar</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="h : ${horarios}">
										<td>
											<i class="fas fa-calendar-day me-1" style="color:var(--tecnm-azul);"></i>
											<span th:text="${h.diaSemana}"></span>
										</td>
										<td class="text-center"
											th:text="${#strings.substring(h.horaInicio.toString(), 0, 5)}"></td>
										<td class="text-center"
											th:text="${#strings.substring(h.horaFin.toString(), 0, 5)}"></td>
										<td th:text="${h.espacio != null ? h.espacio.nombre : '—'}"></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>

			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
