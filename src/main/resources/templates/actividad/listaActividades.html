<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<title>Actividades</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-11">

				<!-- Mensajes flash -->
				<div th:if="${msg != null and #strings.startsWith(msg, '⚠')}"
				     class="alert alert-danger alert-dismissible fade show" role="alert">
					<i class="fas fa-exclamation-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div th:if="${msg != null and !#strings.startsWith(msg, '⚠')}"
				     class="alert alert-success alert-dismissible fade show" role="alert">
					<i class="fas fa-check-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>

				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span>
							<i class="fas fa-running me-2"></i>
							<span th:if="${soloMisActividades}">Mis actividades</span>
							<span th:unless="${soloMisActividades}">Actividades complementarias</span>
						</span>
						<a sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_ENCARGADO')"
						   th:href="@{/actividad/nuevo}" class="btn btn-light btn-sm">
							<i class="fas fa-plus me-1"></i> Nueva
						</a>
					</div>
					<div class="card-body">
						<form th:action="@{/actividad/actividades}" method="get" class="d-flex gap-2 mb-3 flex-wrap">
							<input type="text" name="nombre" class="form-control form-control-sm search-bar"
								placeholder="Buscar por nombre..." th:value="${nombre}">
							<select name="idSemestre" class="form-select form-select-sm" style="max-width:220px;">
								<option value="">— Todos los semestres —</option>
								<option th:each="s : ${semestres}" th:value="${s.id}" th:text="${s.nombre}"
									th:selected="${idSemestre == s.id}"></option>
							</select>
							<button class="btn btn-sm btn-guardar"><i class="bi bi-search"></i> Buscar</button>
							<a th:href="@{/actividad/actividades}" class="btn btn-sm btn-outline-secondary">Limpiar</a>
						</form>
						<div class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>#</th>
										<th>Imagen</th>
										<th>Nombre</th>
										<th>Disciplina</th>
										<th>Semestre</th>
										<th>Instructor</th>
										<th>Cupo</th>
										<th class="text-center">Activo</th>
										<th class="text-center">Operaciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="actividad,actStat : ${actividades}">
										<td th:text="${actStat.count}"></td>
										<td class="text-center">
											<img th:src="@{/images/actividad/{img}(img=${actividad.imagenFlyer})}"
												class="img-actividad" onerror="this.src='/images/no-image.jpg'">
										</td>
										<td th:text="${actividad.nombre}"></td>
										<td th:text="${actividad.disciplina.nombre}"></td>
										<td th:text="${actividad.semestre.nombre}"></td>
										<td th:text="${actividad.instructor.persona.nombre + ' ' + actividad.instructor.persona.apellido}"></td>
										<td class="text-center" th:text="${actividad.cupoMaximo}"></td>
										<td class="text-center">
											<span th:if="${actividad.activo == 1}" class="badge text-bg-success">Sí</span>
											<span th:unless="${actividad.activo == 1}" class="badge text-bg-danger">No</span>
										</td>
										<td class="text-center">
											<a class="btn btn-ver btn-sm"
												th:href="@{/actividad/ver/{id}(id=${actividad.id})}">
												<i class="bi bi-eye"></i>
											</a>
											<a sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_ENCARGADO')"
											   class="btn btn-editar btn-sm"
											   th:href="@{/actividad/editar/{id}(id=${actividad.id})}">
												<i class="bi bi-pencil"></i>
											</a>
											<button sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_ENCARGADO')"
											        class="btn btn-eliminar btn-sm"
											        data-bs-toggle="modal"
											        data-bs-target="#modalEliminar"
											        th:attr="data-id=${actividad.id}, data-nombre=${actividad.nombre}"
											        onclick="prepararEliminar(this)">
												<i class="bi bi-trash"></i>
											</button>
										</td>
									</tr>
									<tr th:if="${#lists.isEmpty(actividades)}">
										<td colspan="9" class="text-center text-muted py-3">No hay actividades registradas.</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>

	<!-- Modal confirmar eliminar -->
	<div class="modal fade" id="modalEliminar" tabindex="-1">
		<div class="modal-dialog">
			<div class="modal-content">
				<div class="modal-header">
					<h5 class="modal-title">
						<i class="fas fa-exclamation-triangle text-warning me-2"></i>
						Confirmar eliminación
					</h5>
					<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
				</div>
				<div class="modal-body">
					¿Está seguro de desactivar <strong id="nombreEliminar"></strong>?
					<br><span style="font-size:12px;color:#666;">La actividad quedará inactiva.</span>
				</div>
				<div class="modal-footer">
					<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancelar</button>
					<a id="btnConfirmarEliminar" href="#" class="btn btn-eliminar">
						Sí, desactivar
					</a>
				</div>
			</div>
		</div>
	</div>

	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script>
		function prepararEliminar(btn) {
			document.getElementById('nombreEliminar').textContent = btn.getAttribute('data-nombre');
			document.getElementById('btnConfirmarEliminar').href = '/actividad/eliminar/' + btn.getAttribute('data-id');
		}
	</script>
</body>

</html>
