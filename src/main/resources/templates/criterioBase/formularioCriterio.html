<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Criterio</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-clipboard-list me-2"></i>
						<span th:text="${criterio.id != null} ? 'Editar criterio' : 'Registrar criterio'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/criterioBase/guardar}" method="post" th:object="${criterio}">
							<input type="hidden" th:field="*{id}">
							<div th:if="${criterio.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${criterio.id}" readonly>
							</div>
							<div class="mb-3">
								<label class="form-label">
									N첬mero de criterio <span class="text-danger">*</span>
								</label>
								<input type="number" class="form-control" th:field="*{numeroCriterio}"
									placeholder="Ej. 1" required min="1" max="7">
								<div class="form-text text-muted" style="font-size:11px;">
									Del 1 al 7 seg첬n el Anexo XVII TecNM.
								</div>
							</div>
							<div class="mb-3">
								<label class="form-label">Nombre <span class="text-danger">*</span></label>
								<input type="text" class="form-control" th:field="*{nombre}"
									placeholder="Ej. Puntualidad" required minlength="2" maxlength="80"
									pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣체횥챰횗\s]+" title="Solo letras y espacios"
									oninput="this.value = capitalizarPalabras(this.value)">
							</div>
							<div class="mb-3">
								<label class="form-label">Descripci처n</label>
								<input type="text" class="form-control" th:field="*{descripcion}"
									placeholder="Ej. Llega a tiempo a las sesiones" maxlength="150"
									pattern="[A-Za-z0-9찼챕챠처첬횁횋횒횙횣체횥챰횗\s\-,.]+"
									oninput="this.value = capitalizarPalabras(this.value)">
							</div>
							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/criterioBase/criterios}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
						<script>
							function capitalizarPalabras(texto) {
								return texto.replace(/(^|\s)\S/g, c => c.toUpperCase());
							}
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
