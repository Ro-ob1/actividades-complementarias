<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<title>Inicio — Actividades Complementarias</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">

		<!-- Buscador de actividades -->
		<div class="row justify-content-center mb-4">
			<div class="col-md-8">
				<form th:action="@{/}" method="get" class="d-flex gap-2">
					<input type="text" name="nombre" class="form-control" placeholder="Buscar actividad por nombre..."
						th:value="${nombre}">
					<button class="btn btn-guardar"><i class="bi bi-search me-1"></i> Buscar</button>
					<a th:href="@{/}" class="btn btn-outline-secondary">Limpiar</a>
				</form>
			</div>
		</div>

		<!-- Semestre activo -->
		<div class="row justify-content-center mb-3">
			<div class="col-md-10">
				<div th:if="${semestre != null}" style="font-size:13px;color:var(--tecnm-gris);">
					<i class="fas fa-calendar-alt me-1"></i>
					Semestre activo: <strong th:text="${semestre.nombre}"></strong>
				</div>
			</div>
		</div>

		<!-- Grid de actividades -->
		<div class="row justify-content-center">
			<div class="col-md-10">
				<div th:if="${#lists.isEmpty(actividades)}" class="text-center py-5">
					<i class="fas fa-search fa-3x mb-3" style="color:var(--tecnm-plata);"></i>
					<p style="color:var(--tecnm-gris);">No se encontraron actividades.</p>
				</div>

				<div class="row g-3">
					<div class="col-md-4" th:each="actividad : ${actividades}">
						<div class="card h-100 shadow-sm"
							th:classappend="${actividad.activo != 1} ? ' opacity-50' : ''">
							<img th:src="@{/images/actividad/{img}(img=${actividad.imagenFlyer})}" class="card-img-top"
								style="height:160px;object-fit:cover;" onerror="this.src='/images/no-image.jpg'">
							<div class="card-body p-3">
								<div class="d-flex justify-content-between align-items-start mb-1">
									<span style="font-size:14px;font-weight:700;color:var(--tecnm-azul);"
										th:text="${actividad.nombre}"></span>
									<span class="badge text-bg-primary" style="font-size:10px;"
										th:text="${actividad.disciplina.nombre}"></span>
								</div>
								<div style="font-size:12px;color:var(--tecnm-gris);" class="mb-1">
									<i class="fas fa-chalkboard-teacher me-1"></i>
									<span
										th:text="${actividad.instructor.persona.nombre + ' ' + actividad.instructor.persona.apellido}"></span>
								</div>
								<div style="font-size:12px;color:var(--tecnm-gris);" class="mb-1">
									<i class="fas fa-users me-1"></i>
									Cupo: <span th:text="${actividad.cupoMaximo}"></span>
								</div>
								<div style="font-size:12px;color:var(--tecnm-gris);">
									<i class="fas fa-star me-1"></i>
									Créditos: <span th:text="${actividad.disciplina.creditos}"></span>
								</div>
							</div>
							<div class="card-footer bg-transparent border-top-0 pb-3 px-3">
								<a th:href="@{/actividad/ver/{id}(id=${actividad.id})}" class="btn btn-sm w-100"
									style="background:var(--tecnm-azul);color:#fff;">
									<i class="bi bi-eye me-1"></i> Ver detalle
								</a>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>

	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
