<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Semestre</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-calendar-alt me-2"></i>
						<span th:text="${semestre.id != null} ? 'Editar semestre' : 'Registrar semestre'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/semestre/guardar}" method="post" th:object="${semestre}"
							onsubmit="return validarFechas()">
							<input type="hidden" th:field="*{id}">
							<div th:if="${semestre.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${semestre.id}" readonly>
							</div>

							<div class="mb-3">
								<label class="form-label">Período <span class="text-danger">*</span></label>
								<div class="d-flex align-items-center gap-3 flex-wrap">
									<div class="form-check">
										<input class="form-check-input" type="radio" name="periodo"
											id="periodoEneJun" value="Ene-Jun" onchange="generarNombre()">
										<label class="form-check-label" for="periodoEneJun">Enero – Junio</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="periodo"
											id="periodoAgoDic" value="Ago-Dic" onchange="generarNombre()">
										<label class="form-check-label" for="periodoAgoDic">Agosto – Diciembre</label>
									</div>
									<input type="number" class="form-control form-control-sm" id="anio"
										placeholder="Año (ej. 2026)" min="2020" max="2040"
										style="max-width:130px;" oninput="generarNombre()">
								</div>
								<input type="hidden" th:field="*{nombre}" id="nombreGenerado">
								<div class="mt-2" id="previewNombre"
									style="font-size:13px;color:var(--tecnm-azul);font-weight:600;"></div>
								<div class="form-text text-muted" style="font-size:11px;">
									Las fechas se sugieren automáticamente; puedes ajustarlas si es necesario.
								</div>
							</div>

							<div class="row g-3 mb-3">
								<div class="col-md-6">
									<label class="form-label">
										Fecha inicio <span class="text-danger">*</span>
									</label>
									<input type="date" class="form-control" id="fechaInicio" name="fechaInicio"
										th:value="${semestre.fechaInicio != null ? #temporals.format(semestre.fechaInicio, 'yyyy-MM-dd') : ''}"
										required>
								</div>
								<div class="col-md-6">
									<label class="form-label">
										Fecha fin <span class="text-danger">*</span>
									</label>
									<input type="date" class="form-control" id="fechaFin" name="fechaFin"
										th:value="${semestre.fechaFin != null ? #temporals.format(semestre.fechaFin, 'yyyy-MM-dd') : ''}"
										required>
								</div>
							</div>

							<div id="errorFechas" class="alert alert-danger py-2 mb-3"
								style="display:none;font-size:13px;">
								<i class="fas fa-exclamation-circle me-1"></i>
								La fecha de inicio debe ser anterior a la fecha de fin.
							</div>

							<div th:if="${semestre.id != null}" class="mb-3">
								<label class="form-label">Activo</label>
								<div class="d-flex gap-3">
									<div class="form-check">
										<input class="form-check-input" type="radio" name="activo" value="1"
											th:checked="${semestre.activo == 1}">
										<label class="form-check-label">Sí</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio" name="activo" value="0"
											th:checked="${semestre.activo == 0}">
										<label class="form-check-label">No</label>
									</div>
								</div>
								<div class="form-text text-muted" style="font-size:11px;">
									Solo debe haber un semestre activo a la vez.
								</div>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/semestre/semestres}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
						<script>
							function validarFechas() {
								const inicio = document.getElementById('fechaInicio').value;
								const fin = document.getElementById('fechaFin').value;
								const error = document.getElementById('errorFechas');
								if (inicio && fin && inicio >= fin) {
									error.style.display = 'block';
									return false;
								}
								error.style.display = 'none';
								return true;
							}
						</script>
						<script>
							const periodos = {
								'Ene-Jun': { inicioMes: 1, iniciodia: 1, finMes: 6, finDia: 30 },
								'Ago-Dic': { inicioMes: 8, iniciodia: 1, finMes: 12, finDia: 31 }
							};

							function toDateStr(year, month, day) {
								return year + '-' + String(month).padStart(2, '0') + '-' + String(day).padStart(2, '0');
							}

							function generarNombre() {
								const anio = document.getElementById('anio').value;
								const radios = document.getElementsByName('periodo');
								let periodo = '';
								for (const r of radios) {
									if (r.checked) { periodo = r.value; break; }
								}
								const preview = document.getElementById('previewNombre');

								if (periodo && anio) {
									const nombre = periodo + ' ' + anio;
									document.getElementById('nombreGenerado').value = nombre;
									preview.textContent = '→ ' + nombre;

									const p = periodos[periodo];
									document.getElementById('fechaInicio').value = toDateStr(anio, p.inicioMes, p.iniciodia);
									document.getElementById('fechaFin').value = toDateStr(anio, p.finMes, p.finDia);
								} else {
									document.getElementById('nombreGenerado').value = '';
									preview.textContent = '';
								}
							}

							// Al editar — pre-cargar el radio y el año desde el nombre guardado
							window.onload = function () {
								const nombre = document.getElementById('nombreGenerado').value;
								if (!nombre) return;
								document.getElementById('previewNombre').textContent = '→ ' + nombre;
								const partes = nombre.split(' ');
								if (partes.length === 2) {
									const per = partes[0];
									const anio = partes[1];
									document.getElementById('anio').value = anio;
									const radios = document.getElementsByName('periodo');
									for (const r of radios) {
										if (r.value === per) { r.checked = true; break; }
									}
								}
							};
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
