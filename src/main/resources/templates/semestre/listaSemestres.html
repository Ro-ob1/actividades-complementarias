<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Semestres</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-10">
				<div th:if="${msg != null and #strings.startsWith(msg, '⚠')}"
					class="alert alert-danger alert-dismissible fade show" role="alert">
					<i class="fas fa-exclamation-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div th:if="${msg != null and !#strings.startsWith(msg, '⚠')}"
					class="alert alert-success alert-dismissible fade show" role="alert">
					<i class="fas fa-check-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-calendar-alt me-2"></i>Semestres</span>
						<a th:href="@{/semestre/nuevo}" class="btn btn-light btn-sm"><i class="fas fa-plus me-1"></i>
							Nuevo</a>
					</div>
					<div class="card-body">
						<div class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>#</th>
										<th>Nombre</th>
										<th>Fecha inicio</th>
										<th>Fecha fin</th>
										<th class="text-center">Activo</th>
										<th class="text-center">Operaciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="semestre,semestreStat : ${semestres}">
										<td th:text="${semestreStat.count}"></td>
										<td th:text="${semestre.nombre}"></td>
										<td th:text="${semestre.fechaInicio}"></td>
										<td th:text="${semestre.fechaFin}"></td>
										<td class="text-center">
											<span th:if="${semestre.activo == 1}"
												class="badge text-bg-success">Sí</span>
											<span th:unless="${semestre.activo == 1}"
												class="badge text-bg-danger">No</span>
										</td>
										<td class="text-center">
											<a class="btn btn-ver btn-sm"
												th:href="@{/semestre/ver/{id}(id=${semestre.id})}"><i
													class="bi bi-eye"></i></a>
											<a class="btn btn-editar btn-sm"
												th:href="@{/semestre/editar/{id}(id=${semestre.id})}"><i
													class="bi bi-pencil"></i></a>
											<button class="btn btn-eliminar btn-sm" data-bs-toggle="modal"
												data-bs-target="#modalEliminar"
												th:attr="data-id=${semestre.id}, data-nombre=${semestre.nombre}"
												onclick="prepararEliminar(this)">
												<i class="bi bi-trash"></i>
											</button>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>
		<div class="modal fade" id="modalEliminar" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							<i class="fas fa-exclamation-triangle text-warning me-2"></i>
							Confirmar eliminación
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body" style="font-size:14px;">
						¿Está seguro de que desea eliminar el semestre
						<strong id="nombreEliminar"></strong>?
						<br>
						<span style="font-size:12px;color:var(--tecnm-gris);">
							Esta acción eliminará toda la información asociada.
						</span>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
							<i class="fas fa-times me-1"></i> Cancelar
						</button>
						<a id="btnConfirmarEliminar" href="#" class="btn btn-eliminar">
							<i class="fas fa-trash me-1"></i> Sí, eliminar
						</a>
					</div>
				</div>
			</div>
		</div>
		<script>
			function prepararEliminar(btn) {
				const id = btn.getAttribute('data-id');
				const nombre = btn.getAttribute('data-nombre');
				document.getElementById('nombreEliminar').textContent = nombre;
				document.getElementById('btnConfirmarEliminar').href =
					'/semestre/eliminar/' + id;
			}
		</script>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
