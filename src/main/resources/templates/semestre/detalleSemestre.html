<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Semestre</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-calendar-alt me-2"></i>Detalle del semestre</span>
						<a th:href="@{/semestre/semestres}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${semestre.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Nombre</div>
							<div class="detalle-valor" th:text="${semestre.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Fecha inicio</div>
							<div class="detalle-valor" th:text="${semestre.fechaInicio}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Fecha fin</div>
							<div class="detalle-valor" th:text="${semestre.fechaFin}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Activo</div>
							<div class="detalle-valor">
								<span th:if="${semestre.activo == 1}" class="badge text-bg-success">Sí</span>
								<span th:unless="${semestre.activo == 1}" class="badge text-bg-danger">No</span>
							</div>
						</div>
						<div class="mt-4">
							<a th:href="@{/semestre/editar/{id}(id=${semestre.id})}" class="btn btn-guardar btn-sm"><i
									class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/semestre/semestres}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
