<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<title>Evaluaciones</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-11">
				<div th:if="${msg != null and #strings.startsWith(msg, '⚠')}"
					class="alert alert-danger alert-dismissible fade show" role="alert">
					<i class="fas fa-exclamation-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div th:if="${msg != null and !#strings.startsWith(msg, '⚠')}"
					class="alert alert-success alert-dismissible fade show" role="alert">
					<i class="fas fa-check-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-star-half-alt me-2"></i>Evaluaciones</span>
						<a sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_INSTRUCTOR')" th:href="@{/evaluacion/nuevo}" class="btn btn-light btn-sm">
							<i class="fas fa-plus me-1"></i> Nueva
						</a>
					</div>
					<div class="card-body">
						<form th:action="@{/evaluacion/evaluaciones}" method="get"
							class="d-flex gap-2 mb-3 search-bar flex-wrap align-items-end">
							<div>
								<label class="form-label mb-1" style="font-size:12px;">Actividad</label>
								<select name="idActividad" class="form-select form-select-sm" style="max-width:220px;">
									<option value="">— Todas —</option>
									<option th:each="act : ${actividades}"
										th:value="${act.id}"
										th:text="${act.nombre}"
										th:selected="${idActividad == act.id}">
									</option>
								</select>
							</div>
							<div>
								<label class="form-label mb-1" style="font-size:12px;">Alumno</label>
								<input type="text" name="alumno" class="form-control form-control-sm"
									style="max-width:170px;" placeholder="Nombre..."
									th:value="${alumno}">
							</div>
							<div>
								<label class="form-label mb-1" style="font-size:12px;">Instructor</label>
								<input type="text" name="instructor" class="form-control form-control-sm"
									style="max-width:170px;" placeholder="Nombre..."
									th:value="${instructor}">
							</div>
							<div>
								<label class="form-label mb-1" style="font-size:12px;">Desde</label>
								<input type="date" name="fechaDesde" class="form-control form-control-sm"
									style="max-width:155px;" th:value="${fechaDesde}">
							</div>
							<div>
								<label class="form-label mb-1" style="font-size:12px;">Hasta</label>
								<input type="date" name="fechaHasta" class="form-control form-control-sm"
									style="max-width:155px;" th:value="${fechaHasta}">
							</div>
							<div class="d-flex gap-2 align-self-end">
								<button class="btn btn-sm btn-guardar">
									<i class="bi bi-search"></i> Buscar
								</button>
								<a th:href="@{/evaluacion/evaluaciones}" class="btn btn-sm btn-outline-secondary">
									Limpiar
								</a>
							</div>
						</form>
						<div class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>ID</th>
										<th>Alumno</th>
										<th>Actividad</th>
										<th>Instructor</th>
										<th>Fecha</th>
										<th class="text-center">Valor (0–100)</th>
										<th>Nivel</th>
										<th class="text-center">Operaciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(evaluaciones)}">
										<td colspan="8" class="text-center text-muted py-3">No se encontraron evaluaciones.</td>
									</tr>
									<tr th:each="evaluacion : ${evaluaciones}">
										<td th:text="${evaluacion.id}"></td>
										<td th:text="${evaluacion.inscripcion.alumno.persona.nombre + ' ' + evaluacion.inscripcion.alumno.persona.apellido}"></td>
										<td th:text="${evaluacion.inscripcion.actividad.nombre}"></td>
										<td th:text="${evaluacion.instructor.persona.nombre + ' ' + evaluacion.instructor.persona.apellido}"></td>
										<td th:text="${evaluacion.fecha}"></td>
										<td class="text-center" th:text="${evaluacion.valorNumerico}"></td>
										<td><span class="badge text-bg-primary" th:text="${evaluacion.nivel.nombre}"></span></td>
										<td class="text-center">
											<a class="btn btn-ver btn-sm"
												th:href="@{/evaluacion/ver/{id}(id=${evaluacion.id})}">
												<i class="bi bi-eye"></i>
											</a>
											<a sec:authorize="hasAnyRole('ROLE_ADMIN','ROLE_INSTRUCTOR')" class="btn btn-editar btn-sm"
												th:href="@{/evaluacion/editar/{id}(id=${evaluacion.id})}">
												<i class="bi bi-pencil"></i>
											</a>
											<button sec:authorize="hasRole('ROLE_ADMIN')" class="btn btn-eliminar btn-sm" data-bs-toggle="modal"
												data-bs-target="#modalEliminar"
												th:attr="data-id=${evaluacion.id}, data-nombre=${evaluacion.inscripcion.alumno.persona.nombre + ' — ' + evaluacion.inscripcion.actividad.nombre}"
												onclick="prepararEliminar(this)">
												<i class="bi bi-trash"></i>
											</button>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="modalEliminar" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							<i class="fas fa-exclamation-triangle text-warning me-2"></i>
							Confirmar eliminación
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body" style="font-size:14px;">
						¿Eliminar la evaluación de <strong id="nombreEliminar"></strong>?
						<br>
						<span style="font-size:12px;color:var(--tecnm-gris);">Esta acción no se puede deshacer.</span>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
							<i class="fas fa-times me-1"></i> Cancelar
						</button>
						<a id="btnConfirmarEliminar" href="#" class="btn btn-eliminar">
							<i class="fas fa-trash me-1"></i> Sí, eliminar
						</a>
					</div>
				</div>
			</div>
		</div>
		<script>
			function prepararEliminar(btn) {
				document.getElementById('nombreEliminar').textContent = btn.getAttribute('data-nombre');
				document.getElementById('btnConfirmarEliminar').href = '/evaluacion/eliminar/' + btn.getAttribute('data-id');
			}
		</script>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
