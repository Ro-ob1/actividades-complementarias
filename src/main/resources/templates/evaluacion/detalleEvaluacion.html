<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Evaluación</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-star-half-alt me-2"></i>Detalle de evaluación</span>
						<a th:href="@{/evaluacion/evaluaciones}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${evaluacion.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Alumno</div>
							<div class="detalle-valor"
								th:text="${evaluacion.inscripcion.alumno.persona.nombre + ' ' + evaluacion.inscripcion.alumno.persona.apellido}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Actividad</div>
							<div class="detalle-valor" th:text="${evaluacion.inscripcion.actividad.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Instructor</div>
							<div class="detalle-valor"
								th:text="${evaluacion.instructor.persona.nombre + ' ' + evaluacion.instructor.persona.apellido}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Fecha</div>
							<div class="detalle-valor" th:text="${evaluacion.fecha}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Valor numérico (0–100)</div>
							<div class="detalle-valor" th:text="${evaluacion.valorNumerico}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Nivel</div>
							<div class="detalle-valor"><span class="badge text-bg-primary"
									th:text="${evaluacion.nivel.nombre}"></span></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Observaciones</div>
							<div class="detalle-valor" th:text="${evaluacion.observaciones}"></div>
						</div>

						<!-- Criterios de evaluación -->
						<div th:if="${criteriosEval != null and !#lists.isEmpty(criteriosEval)}" class="mt-3">
							<div class="detalle-label mb-2">Criterios de evaluación</div>
							<div class="table-responsive">
								<table class="table table-bordered table-sm mb-0" style="font-size:13px;">
									<thead class="table-light">
										<tr>
											<th style="width:50px;">#</th>
											<th>Criterio</th>
											<th class="text-center" style="width:90px;">Valor</th>
											<th class="text-center" style="width:120px;">Nivel</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="ce : ${criteriosEval}">
											<td class="text-center" th:text="${ce.criterio.numeroCriterio}"></td>
											<td th:text="${ce.criterio.nombre}"></td>
											<td class="text-center" th:text="${ce.valor}"></td>
											<td class="text-center">
												<span class="badge text-bg-primary"
													th:if="${ce.nivel != null}"
													th:text="${ce.nivel.nombre}"></span>
												<span th:unless="${ce.nivel != null}" class="text-muted">—</span>
											</td>
										</tr>
									</tbody>
								</table>
							</div>
						</div>

						<div class="mt-4">
							<a th:href="@{/evaluacion/editar/{id}(id=${evaluacion.id})}"
								class="btn btn-guardar btn-sm"><i class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/evaluacion/evaluaciones}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
