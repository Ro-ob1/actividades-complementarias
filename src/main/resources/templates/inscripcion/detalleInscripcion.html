<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Inscripción</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-file-signature me-2"></i>Detalle de inscripción</span>
						<a th:href="@{/inscripcion/inscripciones}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${inscripcion.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Alumno</div>
							<div class="detalle-valor"
								th:text="${inscripcion.alumno.persona.nombre + ' ' + inscripcion.alumno.persona.apellido}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">No. Control</div>
							<div class="detalle-valor" th:text="${inscripcion.alumno.numControl}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Actividad</div>
							<div class="detalle-valor" th:text="${inscripcion.actividad.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Semestre</div>
							<div class="detalle-valor" th:text="${inscripcion.actividad.semestre.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Fecha solicitud</div>
							<div class="detalle-valor" th:text="${inscripcion.fechaSolicitud}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Estatus</div>
							<div class="detalle-valor">
								<span th:if="${inscripcion.estatusSolicitud == 'APROBADA'}"
									class="badge text-bg-success">Aprobada</span>
								<span th:if="${inscripcion.estatusSolicitud == 'PENDIENTE'}"
									class="badge text-bg-warning">Pendiente</span>
								<span th:if="${inscripcion.estatusSolicitud == 'RECHAZADA'}"
									class="badge text-bg-danger">Rechazada</span>
							</div>
						</div>
						<div class="detalle-row" th:if="${inscripcion.motivoRechazo != null}">
							<div class="detalle-label">Motivo de rechazo</div>
							<div class="detalle-valor" th:text="${inscripcion.motivoRechazo}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Horario PDF</div>
							<div class="detalle-valor">
								<a th:if="${inscripcion.archivoHorario != null}"
									th:href="@{/uploads/inscripcion/{pdf}(pdf=${inscripcion.archivoHorario})}"
									target="_blank" class="btn btn-sm btn-outline-secondary">
									<i class="fas fa-file-pdf me-1"></i> Ver PDF
								</a>
								<span th:unless="${inscripcion.archivoHorario != null}">—</span>
							</div>
						</div>
						<div class="mt-4">
							<a th:href="@{/inscripcion/editar/{id}(id=${inscripcion.id})}"
								class="btn btn-guardar btn-sm"><i class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/inscripcion/inscripciones}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
