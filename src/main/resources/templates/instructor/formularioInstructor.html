<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Instructor</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-7">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-chalkboard-teacher me-2"></i>
						<span th:text="${instructor.id != null} ? 'Editar instructor' : 'Registrar instructor'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/instructor/guardar}" method="post"
						      th:object="${instructor}" enctype="multipart/form-data">
						    <input type="hidden" th:field="*{id}">
						    <input type="hidden" name="fotoActual" th:value="${instructor.foto}">

						    <div th:if="${instructor.id != null}" class="mb-3">
						        <label class="form-label">ID</label>
						        <input type="text" class="form-control"
						               th:value="${instructor.id}" readonly>
						    </div>

						    <div class="section-label">Datos personales</div>
						    <div class="row g-3 mb-3">
						        <div class="col-md-6">
						            <label class="form-label">
						                Nombre <span class="text-danger">*</span>
						            </label>
						            <input type="text" name="nombre" class="form-control"
						                   th:value="${persona.nombre}"
						                   placeholder="Ej. Gonzalo"
						                   required minlength="2" maxlength="80"
						                   pattern="[A-Za-záéíóúÁÉÍÓÚüÜñÑ\s]+"
						                   title="Solo letras y espacios"
						                   oninput="this.value = capitalizarPalabras(this.value)">
						        </div>
						        <div class="col-md-6">
						            <label class="form-label">
						                Apellido <span class="text-danger">*</span>
						            </label>
						            <input type="text" name="apellido" class="form-control"
						                   th:value="${persona.apellido}"
						                   placeholder="Ej. García García"
						                   required minlength="2" maxlength="80"
						                   pattern="[A-Za-záéíóúÁÉÍÓÚüÜñÑ\s]+"
						                   title="Solo letras y espacios"
						                   oninput="this.value = capitalizarPalabras(this.value)">
						        </div>
						        <div class="col-md-6">
						            <label class="form-label">Email</label>
						            <input type="email" name="email" class="form-control"
						                   th:value="${persona.email}"
						                   placeholder="Ej. gonzalo@itch.edu.mx"
						                   maxlength="100">
						        </div>
						        <div class="col-md-6">
						            <label class="form-label">Teléfono</label>
						            <input type="tel" name="telefono" class="form-control"
						                   th:value="${persona.telefono}"
						                   placeholder="Ej. 7471234567"
						                   maxlength="10"
						                   pattern="[0-9]{10}"
						                   title="10 dígitos numéricos">
						        </div>
						    </div>

						    <div class="section-label">Datos del instructor</div>
						    <div class="mb-3">
						        <label class="form-label">
						            Disciplina <span class="text-danger">*</span>
						        </label>
						        <select name="disciplina.id" class="form-select" required>
						            <option value="">— Seleccione —</option>
						            <option th:each="d : ${disciplinas}"
						                    th:value="${d.id}"
						                    th:text="${d.nombre}"
						                    th:selected="${instructor.disciplina != null
						                                   and instructor.disciplina.id == d.id}">
						            </option>
						        </select>
						    </div>

						    <div th:if="${instructor.foto != null
						                  and instructor.foto != 'no-image.jpg'}" class="mb-2">
						        <label class="form-label">Foto actual</label><br>
						        <img th:src="@{/images/instructor/{img}(img=${instructor.foto})}"
						             class="img-actividad rounded">
						    </div>
						    <div class="mb-3">
						        <label class="form-label">Foto</label>
						        <input type="file" name="fotoArchivo"
						               class="form-control" accept="image/*">
						    </div>

						    <div th:if="${instructor.id != null}" class="mb-3">
						        <label class="form-label">Activo</label>
						        <div class="d-flex gap-3">
						            <div class="form-check">
						                <input class="form-check-input" type="radio"
						                       name="activo" value="1"
						                       th:checked="${instructor.activo == 1}">
						                <label class="form-check-label">Sí</label>
						            </div>
						            <div class="form-check">
						                <input class="form-check-input" type="radio"
						                       name="activo" value="0"
						                       th:checked="${instructor.activo == 0}">
						                <label class="form-check-label">No</label>
						            </div>
						        </div>
						    </div>

						    <div class="d-flex gap-2 mt-3">
						        <button type="submit" class="btn btn-guardar">
						            <i class="fas fa-save me-1"></i> Guardar
						        </button>
						        <a th:href="@{/instructor/instructores}"
						           class="btn btn-outline-secondary">
						            <i class="fas fa-times me-1"></i> Cancelar
						        </a>
						    </div>
						</form>
						<script>
						function capitalizarPalabras(texto) {
						    return texto.replace(/(^|\s)\S/g, c => c.toUpperCase());
						}
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
