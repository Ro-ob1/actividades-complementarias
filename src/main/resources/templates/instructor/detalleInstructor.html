<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Instructor</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-chalkboard-teacher me-2"></i>Detalle del instructor</span>
						<a th:href="@{/instructor/instructores}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="d-flex align-items-center gap-3 mb-4">
							<img th:src="@{/images/instructor/{img}(img=${instructor.foto})}"
								class="img-actividad rounded-circle" style="width:64px;height:64px;"
								onerror="this.src='/images/no-image.jpg'">
							<div>
								<div style="font-size:17px;font-weight:700;color:#1a1a2e;"
									th:text="${instructor.persona.nombre + ' ' + instructor.persona.apellido}"></div>
								<div style="font-size:12px;color:var(--tecnm-gris);"
									th:text="${instructor.disciplina != null ? instructor.disciplina.nombre : '—'}"></div>
							</div>
						</div>
						<div class="section-label">Datos personales</div>
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${instructor.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Email</div>
							<div class="detalle-valor" th:text="${instructor.persona.email}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Teléfono</div>
							<div class="detalle-valor" th:text="${instructor.persona.telefono}"></div>
						</div>
						<div class="section-label mt-3">Datos del instructor</div>
						<div class="detalle-row">
							<div class="detalle-label">Disciplina</div>
							<div class="detalle-valor" th:text="${instructor.disciplina != null ? instructor.disciplina.nombre : '—'}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Estatus</div>
							<div class="detalle-valor">
								<span th:if="${instructor.activo == 1}" class="badge text-bg-success">Activo</span>
								<span th:unless="${instructor.activo == 1}" class="badge text-bg-danger">Inactivo</span>
							</div>
						</div>
						<div class="mt-4">
							<a th:href="@{/instructor/editar/{id}(id=${instructor.id})}"
								class="btn btn-guardar btn-sm"><i class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/instructor/instructores}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
