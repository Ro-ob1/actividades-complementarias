<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Solicitud de inscripción</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-file-signature me-2"></i>Solicitar inscripción
					</div>
					<div class="card-body p-4">

						<!-- Datos de la actividad (solo lectura) -->
						<div class="section-label">Actividad seleccionada</div>
						<div class="mb-3 p-3" style="background:#f4f6f8;border-radius:8px;">
							<div style="font-weight:700;color:var(--tecnm-azul);" th:text="${actividad.nombre}"></div>
							<div style="font-size:12px;color:var(--tecnm-gris);">
								<i class="fas fa-dumbbell me-1"></i>
								<span th:text="${actividad.disciplina.nombre}"></span>
								&nbsp;·&nbsp;
								<i class="fas fa-star me-1"></i>
								<span th:text="${actividad.disciplina.creditos}"></span> créditos
							</div>
							<div style="font-size:12px;color:var(--tecnm-gris);">
								<i class="fas fa-chalkboard-teacher me-1"></i>
								<span th:text="${actividad.instructor.persona.nombre
                                            + ' ' + actividad.instructor.persona.apellido}"></span>
							</div>
						</div>

						<!-- Datos del alumno (solo lectura) -->
						<div class="section-label">Mis datos</div>
						<div class="mb-3 p-3" style="background:#f4f6f8;border-radius:8px;">
							<div style="font-weight:700;"
								th:text="${alumno.persona.nombre + ' ' + alumno.persona.apellido}"></div>
							<div style="font-size:12px;color:var(--tecnm-gris);"
								th:text="'No. Control: ' + ${alumno.numControl}"></div>
							<div style="font-size:12px;color:var(--tecnm-gris);" th:text="${alumno.carrera.nombre}">
							</div>
						</div>

						<!-- Formulario -->
						<form th:action="@{/alumno/solicitar}" method="post" enctype="multipart/form-data">
							<input type="hidden" name="idActividad" th:value="${actividad.id}">

							<div class="mb-3">
								<label class="form-label">
									Adjuntar horario académico (PDF)
									<small class="text-muted">— para verificar que no hay conflicto</small>
								</label>
								<input type="file" name="archivoHorarioPdf" class="form-control" accept=".pdf">
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-paper-plane me-1"></i> Enviar solicitud
								</button>
								<a th:href="@{/alumno/catalogo}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>

					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
