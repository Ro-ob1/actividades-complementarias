<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Alumno</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-user-graduate me-2"></i>Detalle del alumno</span>
						<a th:href="@{/alumno/alumnos}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="d-flex align-items-center gap-3 mb-4">
							<div class="avatar-circle" th:text="${#strings.substring(alumno.persona.nombre,0,1)}"></div>
							<div>
								<div style="font-size:17px;font-weight:700;color:#1a1a2e;"
									th:text="${alumno.persona.nombre + ' ' + alumno.persona.apellido}"></div>
								<div style="font-size:12px;color:var(--tecnm-gris);"
									th:text="'No. Control: ' + ${alumno.numControl}"></div>
							</div>
						</div>

						<div class="section-label">Datos personales</div>
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${alumno.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Email</div>
							<div class="detalle-valor" th:text="${alumno.persona.email}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Teléfono</div>
							<div class="detalle-valor" th:text="${alumno.persona.telefono}"></div>
						</div>

						<div class="section-label mt-3">Datos académicos</div>
						<div class="detalle-row">
							<div class="detalle-label">Carrera</div>
							<div class="detalle-valor" th:text="${alumno.carrera.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Semestre actual</div>
							<div class="detalle-valor" th:text="${alumno.semestreActual}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Estatus</div>
							<div class="detalle-valor">
								<span th:if="${alumno.activo == 1}" class="badge text-bg-success">Activo</span>
								<span th:unless="${alumno.activo == 1}" class="badge text-bg-danger">Inactivo</span>
							</div>
						</div>
						<div class="mt-4">
							<a th:href="@{/alumno/editar/{id}(id=${alumno.id})}" class="btn btn-guardar btn-sm"><i
									class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/alumno/alumnos}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
