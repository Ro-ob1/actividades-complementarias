<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
	<meta charset="UTF-8">
	<title>Catálogo de actividades</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	<style>
		.act-card {
			background: #fff;
			border: 1px solid #d6dce8;
			border-radius: 10px;
			overflow: hidden;
			height: 100%;
			display: flex;
			flex-direction: column;
		}

		.act-card.cupo-lleno {
			opacity: .6;
		}

		.act-card-body {
			padding: 1rem;
			flex-grow: 1;
		}

		.act-card-footer {
			padding: .75rem 1rem;
			border-top: 1px solid #eef0f4;
		}

		.act-nombre {
			font-size: 15px;
			font-weight: 700;
			color: var(--tecnm-azul);
		}

		.act-meta {
			font-size: 12px;
			color: var(--tecnm-gris);
			margin-top: 4px;
		}

		.act-meta i {
			width: 14px;
		}
	</style>
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">

		<!-- Encabezado -->
		<div class="d-flex align-items-center justify-content-between mb-3">
			<div>
				<h5 style="color:var(--tecnm-azul);font-weight:700;margin:0;">
					Catálogo de actividades
				</h5>
				<div style="font-size:12px;color:var(--tecnm-gris);" th:if="${semestre != null}">
					<i class="fas fa-calendar-alt me-1"></i>
					<span th:text="${semestre.nombre}"></span>
				</div>
			</div>
			<a th:href="@{/alumno/inicio}" class="btn btn-outline-secondary btn-sm">
				<i class="bi bi-arrow-left me-1"></i> Mi panel
			</a>
		</div>

		<!-- Buscador -->
		<form th:action="@{/alumno/catalogo}" method="get" class="d-flex gap-2 mb-4 search-bar">
			<input type="text" name="nombre" class="form-control form-control-sm" placeholder="Buscar actividad..."
				th:value="${nombre}">
			<button class="btn btn-sm btn-guardar"><i class="bi bi-search"></i></button>
			<a th:href="@{/alumno/catalogo}" class="btn btn-sm btn-outline-secondary">Limpiar</a>
		</form>

		<!-- Sin resultados -->
		<div th:if="${actividades == null or actividades.isEmpty()}" class="text-center py-5"
			style="color:var(--tecnm-gris);">
			<i class="fas fa-search fa-3x mb-3"></i>
			<p>No se encontraron actividades disponibles.</p>
		</div>

		<!-- Grid de tarjetas -->
		<div class="row g-3" th:unless="${actividades == null or actividades.isEmpty()}">
			<div class="col-md-6" th:each="actividad : ${actividades}">
				<div th:class="${actividad.cupoMaximo != null and actividad.cupoMaximo <= 0}
                           ? 'act-card cupo-lleno shadow-sm'
                           : 'act-card shadow-sm'">

					<!-- Imagen -->
					<img th:src="@{/images/actividad/{img}(img=${actividad.imagenFlyer})}"
						style="height:140px;width:100%;object-fit:cover;" onerror="this.src='/images/no-image.jpg'">

					<div class="act-card-body">
						<!-- Nombre y disciplina -->
						<div class="d-flex justify-content-between align-items-start mb-2">
							<span class="act-nombre" th:text="${actividad.nombre}"></span>
							<span class="badge text-bg-primary" style="font-size:10px;"
								th:text="${actividad.disciplina.nombre}"></span>
						</div>

						<!-- Datos del instructor -->
						<div class="act-meta">
							<i class="fas fa-chalkboard-teacher"></i>
							<span th:text="${actividad.instructor.persona.nombre
                                        + ' ' + actividad.instructor.persona.apellido}"></span>
						</div>

						<!-- Créditos -->
						<div class="act-meta">
							<i class="fas fa-star"></i>
							Créditos: <span th:text="${actividad.disciplina.creditos}"></span>
						</div>

						<!-- Cupo -->
						<div class="act-meta">
							<i class="fas fa-users"></i>
							Cupo máximo:
							<span th:text="${actividad.cupoMaximo != null}
                                       ? ${actividad.cupoMaximo}
                                       : 'Sin límite'"></span>
						</div>
					</div>

					<!-- Footer con botón -->
					<div class="act-card-footer">

						<!-- Cupo lleno -->
						<div th:if="${actividad.cupoMaximo != null and actividad.cupoMaximo <= 0}">
							<span class="badge text-bg-danger w-100 py-2">Sin cupo disponible</span>
						</div>

						<!-- Puede inscribirse -->
						<div th:unless="${actividad.cupoMaximo != null and actividad.cupoMaximo <= 0}">
							<a th:href="@{/alumno/solicitar(idActividad=${actividad.id})}"
								class="btn btn-guardar btn-sm w-100">
								<i class="fas fa-file-signature me-1"></i> Solicitar inscripción
							</a>
						</div>
					</div>
				</div>
			</div>
		</div>

	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
