<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Criterio Eval</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-tasks me-2"></i>Detalle del criterio evaluado</span>
						<a th:href="@{/criterioEval/criterios}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${criterioEval.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Alumno</div>
							<div class="detalle-valor"
								th:text="${criterioEval.evaluacion.inscripcion.alumno.persona.nombre + ' ' + criterioEval.evaluacion.inscripcion.alumno.persona.apellido}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Actividad</div>
							<div class="detalle-valor"
								th:text="${criterioEval.evaluacion.inscripcion.actividad.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Criterio</div>
							<div class="detalle-valor" th:text="${criterioEval.criterio.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Valor</div>
							<div class="detalle-valor" th:text="${criterioEval.valor}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Nivel</div>
							<div class="detalle-valor"><span class="badge text-bg-primary"
									th:text="${criterioEval.nivel.nombre}"></span></div>
						</div>
						<div class="mt-4">
							<a th:href="@{/criterioEval/editar/{id}(id=${criterioEval.id})}"
								class="btn btn-guardar btn-sm"><i class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/criterioEval/criterios}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
