<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Criterio Evaluado</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-tasks me-2"></i>
						<span th:text="${criterioEval.id != null} ? 'Editar criterio evaluado' : 'Registrar criterio evaluado'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/criterioEval/guardar}" method="post" th:object="${criterioEval}">
							<input type="hidden" th:field="*{id}">

							<div th:if="${criterioEval.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${criterioEval.id}" readonly>
							</div>

							<div class="mb-3">
								<label class="form-label">Evaluación <span class="text-danger">*</span></label>
								<select class="form-select" name="evaluacion.id" required>
									<option value="">— Seleccione —</option>
									<option th:each="e : ${evaluaciones}"
										th:value="${e.id}"
										th:text="${e.inscripcion.alumno.persona.nombre + ' — ' + e.inscripcion.actividad.nombre}"
										th:selected="${criterioEval.evaluacion != null and criterioEval.evaluacion.id == e.id}">
									</option>
								</select>
							</div>

							<div class="mb-3">
								<label class="form-label">Criterio <span class="text-danger">*</span></label>
								<select class="form-select" name="criterio.id" required>
									<option value="">— Seleccione —</option>
									<option th:each="c : ${criteriosBase}"
										th:value="${c.id}"
										th:text="${c.numeroCriterio + '. ' + c.nombre}"
										th:selected="${criterioEval.criterio != null and criterioEval.criterio.id == c.id}">
									</option>
								</select>
							</div>

							<div class="row g-3 mb-3">
								<div class="col-md-6">
									<label class="form-label">Valor <span class="text-danger">*</span></label>
									<input type="number" step="0.01" min="0" max="10" class="form-control"
										th:field="*{valor}" placeholder="Ej. 9.5" required>
								</div>
								<div class="col-md-6">
									<label class="form-label">Nivel <span class="text-danger">*</span></label>
									<select class="form-select" name="nivel.id" required>
										<option value="">— Seleccione —</option>
										<option th:each="n : ${niveles}"
											th:value="${n.id}"
											th:text="${n.nombre}"
											th:selected="${criterioEval.nivel != null and criterioEval.nivel.id == n.id}">
										</option>
									</select>
								</div>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/criterioEval/criterios}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
