<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Criterios Evaluados</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-11">
				<div th:if="${msg != null and #strings.startsWith(msg, '⚠')}"
					class="alert alert-danger alert-dismissible fade show" role="alert">
					<i class="fas fa-exclamation-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div th:if="${msg != null and !#strings.startsWith(msg, '⚠')}"
					class="alert alert-success alert-dismissible fade show" role="alert">
					<i class="fas fa-check-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-tasks me-2"></i>Criterios evaluados</span>
						<a th:href="@{/criterioEval/nuevo}" class="btn btn-light btn-sm">
							<i class="fas fa-plus me-1"></i> Nuevo
						</a>
					</div>
					<div class="card-body">
						<div class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>#</th>
										<th>Evaluación</th>
										<th>Criterio</th>
										<th class="text-center">Valor</th>
										<th>Nivel</th>
										<th class="text-center">Operaciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(criterios)}">
										<td colspan="6" class="text-center text-muted py-3">No se encontraron criterios evaluados.</td>
									</tr>
									<tr th:each="criterio,criterioStat : ${criterios}">
										<td th:text="${criterioStat.count}"></td>
										<td th:text="${criterio.evaluacion.inscripcion.alumno.persona.nombre + ' — ' + criterio.evaluacion.inscripcion.actividad.nombre}"></td>
										<td th:text="${criterio.criterio.nombre}"></td>
										<td class="text-center" th:text="${criterio.valor}"></td>
										<td><span class="badge text-bg-primary" th:text="${criterio.nivel.nombre}"></span></td>
										<td class="text-center">
											<a class="btn btn-ver btn-sm"
												th:href="@{/criterioEval/ver/{id}(id=${criterio.id})}">
												<i class="bi bi-eye"></i>
											</a>
											<a class="btn btn-editar btn-sm"
												th:href="@{/criterioEval/editar/{id}(id=${criterio.id})}">
												<i class="bi bi-pencil"></i>
											</a>
											<button class="btn btn-eliminar btn-sm" data-bs-toggle="modal"
												data-bs-target="#modalEliminar"
												th:attr="data-id=${criterio.id}, data-nombre=${criterio.evaluacion.inscripcion.alumno.persona.nombre + ' — ' + criterio.criterio.nombre}"
												onclick="prepararEliminar(this)">
												<i class="bi bi-trash"></i>
											</button>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="modalEliminar" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							<i class="fas fa-exclamation-triangle text-warning me-2"></i>
							Confirmar eliminación
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body" style="font-size:14px;">
						¿Eliminar el criterio evaluado de <strong id="nombreEliminar"></strong>?
						<br>
						<span style="font-size:12px;color:var(--tecnm-gris);">Esta acción no se puede deshacer.</span>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
							<i class="fas fa-times me-1"></i> Cancelar
						</button>
						<a id="btnConfirmarEliminar" href="#" class="btn btn-eliminar">
							<i class="fas fa-trash me-1"></i> Sí, eliminar
						</a>
					</div>
				</div>
			</div>
		</div>
		<script>
			function prepararEliminar(btn) {
				document.getElementById('nombreEliminar').textContent = btn.getAttribute('data-nombre');
				document.getElementById('btnConfirmarEliminar').href = '/criterioEval/eliminar/' + btn.getAttribute('data-id');
			}
		</script>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
