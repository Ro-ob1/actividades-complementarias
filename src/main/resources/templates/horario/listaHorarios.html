<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Horarios</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-11">
				<div th:if="${msg != null and #strings.startsWith(msg, '⚠')}"
					class="alert alert-danger alert-dismissible fade show" role="alert">
					<i class="fas fa-exclamation-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div th:if="${msg != null and !#strings.startsWith(msg, '⚠')}"
					class="alert alert-success alert-dismissible fade show" role="alert">
					<i class="fas fa-check-circle me-1"></i>
					<span th:text="${msg}"></span>
					<button type="button" class="btn-close" data-bs-dismiss="alert"></button>
				</div>
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-clock me-2"></i>Horarios</span>
						<a th:href="@{/horario/nuevo}" class="btn btn-light btn-sm">
							<i class="fas fa-plus me-1"></i> Nuevo
						</a>
					</div>
					<div class="card-body">
						<form th:action="@{/horario/horarios}" method="get" class="d-flex gap-2 mb-3 search-bar flex-wrap">
							<select name="idInstructor" class="form-select form-select-sm" style="max-width:220px;">
								<option value="">— Todos los instructores —</option>
								<option th:each="i : ${instructores}"
									th:value="${i.id}"
									th:text="${i.persona.nombre + ' ' + i.persona.apellido}"
									th:selected="${idInstructor == i.id}">
								</option>
							</select>
							<select name="idSemestre" class="form-select form-select-sm" style="max-width:220px;">
								<option value="">— Todos los semestres —</option>
								<option th:each="s : ${semestres}"
									th:value="${s.id}"
									th:text="${s.nombre}"
									th:selected="${idSemestre == s.id}">
								</option>
							</select>
							<select name="dia" class="form-select form-select-sm" style="max-width:150px;">
								<option value="">— Todos los días —</option>
								<option value="LUNES"     th:selected="${dia == 'LUNES'}">Lunes</option>
								<option value="MARTES"    th:selected="${dia == 'MARTES'}">Martes</option>
								<option value="MIERCOLES" th:selected="${dia == 'MIERCOLES'}">Miércoles</option>
								<option value="JUEVES"    th:selected="${dia == 'JUEVES'}">Jueves</option>
								<option value="VIERNES"   th:selected="${dia == 'VIERNES'}">Viernes</option>
							</select>
							<button class="btn btn-sm btn-guardar"><i class="bi bi-search"></i> Buscar</button>
							<a th:href="@{/horario/horarios}" class="btn btn-sm btn-outline-secondary">Limpiar</a>
						</form>
						<div th:if="${instructorTieneHorarios}" class="d-flex justify-content-end mb-2">
							<a th:href="@{/horario/instructor/{id}/pdf(id=${idInstructor})}"
								class="btn btn-sm btn-eliminar" target="_blank">
								<i class="bi bi-file-pdf me-1"></i> Generar PDF del instructor
							</a>
						</div>
						<div class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>#</th>
										<th>Actividad</th>
										<th>Días</th>
										<th>Hora inicio</th>
										<th>Hora fin</th>
										<th>Espacio</th>
										<th>Acciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:if="${#lists.isEmpty(horarioGrupos)}">
										<td colspan="7" class="text-center text-muted py-3">No se encontraron horarios.</td>
									</tr>
									<tr th:each="grupo, grupoStat : ${horarioGrupos}">
										<td th:text="${grupoStat.count}"></td>
										<td th:text="${grupo.actividad}"></td>
										<td>
											<div class="d-flex flex-wrap gap-1">
												<span th:each="item : ${grupo.items}"
													class="badge text-bg-secondary"
													th:text="${item.diaCorto}"></span>
											</div>
										</td>
										<td th:text="${grupo.horaInicio}"></td>
										<td th:text="${grupo.horaFin}"></td>
										<td th:text="${grupo.espacio}"></td>
										<td class="text-nowrap">
											<a class="btn btn-ver btn-sm me-1"
												th:href="@{/horario/ver/{id}(id=${grupo.items[0].id})}">
												<i class="bi bi-eye"></i>
											</a>
											<a class="btn btn-editar btn-sm me-1"
												th:href="@{/horario/editarGrupo(ids=${grupo.idsString})}">
												<i class="bi bi-pencil"></i>
											</a>
											<button class="btn btn-eliminar btn-sm"
												data-bs-toggle="modal" data-bs-target="#modalEliminar"
												th:attr="data-ids=${grupo.idsString}, data-nombre=${grupo.actividad}"
												onclick="prepararEliminar(this)">
												<i class="bi bi-trash"></i>
											</button>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>
			</div>
		</div>

		<div class="modal fade" id="modalEliminar" tabindex="-1">
			<div class="modal-dialog">
				<div class="modal-content">
					<div class="modal-header">
						<h5 class="modal-title">
							<i class="fas fa-exclamation-triangle text-warning me-2"></i>
							Confirmar eliminación
						</h5>
						<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
					</div>
					<div class="modal-body" style="font-size:14px;">
						¿Está seguro de que desea eliminar el horario
						<strong id="nombreEliminar"></strong>?
						<br>
						<span style="font-size:12px;color:var(--tecnm-gris);">Esta acción no se puede deshacer.</span>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">
							<i class="fas fa-times me-1"></i> Cancelar
						</button>
						<a id="btnConfirmarEliminar" href="#" class="btn btn-eliminar">
							<i class="fas fa-trash me-1"></i> Sí, eliminar
						</a>
					</div>
				</div>
			</div>
		</div>
		<script>
			function prepararEliminar(btn) {
				document.getElementById('nombreEliminar').textContent = btn.getAttribute('data-nombre');
				document.getElementById('btnConfirmarEliminar').href = '/horario/eliminarGrupo?ids=' + btn.getAttribute('data-ids');
			}
		</script>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
