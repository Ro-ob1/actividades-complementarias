<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Horario</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-clock me-2"></i>Detalle del horario</span>
						<a th:href="@{/horario/horarios}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${horario.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Actividad</div>
							<div class="detalle-valor" th:text="${horario.actividad.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Día</div>
							<div class="detalle-valor" th:text="${horario.diaSemana}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Hora inicio</div>
							<div class="detalle-valor" th:text="${horario.horaInicio}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Hora fin</div>
							<div class="detalle-valor" th:text="${horario.horaFin}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Espacio</div>
							<div class="detalle-valor" th:text="${horario.espacio.nombre}"></div>
						</div>
						<div class="mt-4">
							<a th:href="@{/horario/editar/{id}(id=${horario.id})}" class="btn btn-guardar btn-sm"><i
									class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/horario/horarios}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
