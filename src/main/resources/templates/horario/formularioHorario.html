<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Horario</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
	<style>
		.cal-table { font-size: 10px; }
		.cal-table th, .cal-table td { padding: 2px 4px; text-align: center; word-break: break-word; vertical-align: top; }
		.cal-table td.hora-col { width: 34px; font-size: 9px; color: #666; text-align: right; padding-right: 4px; white-space: nowrap; }
		.cal-table th:not(.hora-col), .cal-table td:not(.hora-col) { width: 62px; }
		.cal-ocupado  { background: #cfe2ff !important; }
		.cal-propio   { background: #d1e7dd !important; }
		.cal-conflicto { background: #f8d7da !important; font-weight: bold; }
		.cal-nombre { display: block; font-size: 9px; word-break: break-word; white-space: normal; }
		.legend-box { display: inline-block; width: 14px; height: 14px; border-radius: 2px; margin-right: 3px; vertical-align: middle; }
	</style>
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container-fluid flex-grow-1 my-4">
		<div class="row justify-content-center g-3">

			<!-- Formulario -->
			<div class="col-md-5 col-lg-4">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-clock me-2"></i>
						<span th:text="${modoGrupo ? 'Editar grupo de horarios' : (horario.id != null ? 'Editar horario' : 'Registrar horario')}"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/horario/guardar}" method="post" th:object="${horario}"
							onsubmit="return validarForm()">

							<!-- Hidden inputs -->
							<input type="hidden" name="id" th:value="${horario.id}" th:if="${horario.id != null and !modoGrupo}">
							<input type="hidden" name="modoGrupo" value="true" th:if="${modoGrupo}">
							<th:block th:if="${modoGrupo}">
								<input type="hidden" name="idLUNES"     th:if="${diaIdMap != null and diaIdMap.containsKey('LUNES')}"     th:value="${diaIdMap['LUNES']}">
								<input type="hidden" name="idMARTES"    th:if="${diaIdMap != null and diaIdMap.containsKey('MARTES')}"    th:value="${diaIdMap['MARTES']}">
								<input type="hidden" name="idMIERCOLES" th:if="${diaIdMap != null and diaIdMap.containsKey('MIERCOLES')}" th:value="${diaIdMap['MIERCOLES']}">
								<input type="hidden" name="idJUEVES"    th:if="${diaIdMap != null and diaIdMap.containsKey('JUEVES')}"    th:value="${diaIdMap['JUEVES']}">
								<input type="hidden" name="idVIERNES"   th:if="${diaIdMap != null and diaIdMap.containsKey('VIERNES')}"   th:value="${diaIdMap['VIERNES']}">
							</th:block>

							<div th:if="${horario.id != null and !modoGrupo}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${horario.id}" readonly>
							</div>

							<!-- Actividad -->
							<div class="mb-3">
								<label class="form-label">Actividad <span class="text-danger">*</span></label>
								<select class="form-select" id="selectActividad" name="idActividad" required>
									<option value="">— Seleccione —</option>
									<option th:each="a : ${actividades}"
										th:value="${a.id}"
										th:text="${a.nombre}"
										th:selected="${horario.actividad != null and horario.actividad.id == a.id}">
									</option>
								</select>
							</div>

							<!-- Espacio -->
							<div class="mb-3">
								<label class="form-label">Espacio <span class="text-danger">*</span></label>
								<select class="form-select" id="selectEspacio" name="idEspacio" required
									onchange="renderCalendario()">
									<option value="">— Seleccione —</option>
									<option th:each="e : ${espacios}"
										th:value="${e.id}"
										th:text="${e.nombre}"
										th:selected="${horario.espacio != null and horario.espacio.id == e.id}">
									</option>
								</select>
							</div>

							<!-- Días -->
							<div class="mb-3">
								<label class="form-label">Día(s) <span class="text-danger">*</span></label>

								<!-- Nuevo o edición de grupo: checkboxes -->
								<div th:if="${horario.id == null or modoGrupo}" class="d-flex flex-wrap gap-2">
									<div th:each="d : ${ {'LUNES','MARTES','MIERCOLES','JUEVES','VIERNES'} }" class="form-check form-check-inline">
										<input class="form-check-input dia-check" type="checkbox" name="dias"
											th:value="${d}" th:id="${'dia_' + d}"
											th:checked="${modoGrupo and diaIdMap != null and diaIdMap.containsKey(d)}"
											onchange="renderCalendario()">
										<label class="form-check-label"
											th:for="${'dia_' + d}"
											th:text="${d == 'LUNES' ? 'Lun' : d == 'MARTES' ? 'Mar' : d == 'MIERCOLES' ? 'Mié' : d == 'JUEVES' ? 'Jue' : 'Vie'}">
										</label>
									</div>
								</div>

								<!-- Editar individual: select -->
								<div th:if="${horario.id != null and !modoGrupo}">
									<select class="form-select" name="dia" required onchange="renderCalendario()">
										<option value="LUNES"     th:selected="${horario.diaSemana == 'LUNES'}">Lunes</option>
										<option value="MARTES"    th:selected="${horario.diaSemana == 'MARTES'}">Martes</option>
										<option value="MIERCOLES" th:selected="${horario.diaSemana == 'MIERCOLES'}">Miércoles</option>
										<option value="JUEVES"    th:selected="${horario.diaSemana == 'JUEVES'}">Jueves</option>
										<option value="VIERNES"   th:selected="${horario.diaSemana == 'VIERNES'}">Viernes</option>
									</select>
								</div>
							</div>

							<!-- Horas -->
							<div class="row g-3 mb-3">
								<div class="col-6">
									<label class="form-label">Hora inicio <span class="text-danger">*</span></label>
									<input type="time" class="form-control" name="horaInicio" id="horaInicio"
										th:value="${horario.horaInicio != null ? #strings.substring(horario.horaInicio.toString(), 0, 5) : ''}"
										required min="07:00" max="17:00" onchange="renderCalendario()" oninput="renderCalendario()">
								</div>
								<div class="col-6">
									<label class="form-label">Hora fin <span class="text-danger">*</span></label>
									<input type="time" class="form-control" name="horaFin" id="horaFin"
										th:value="${horario.horaFin != null ? #strings.substring(horario.horaFin.toString(), 0, 5) : ''}"
										required min="08:00" max="18:00" onchange="renderCalendario()" oninput="renderCalendario()">
								</div>
							</div>

							<div id="errorHoras" class="alert alert-danger py-2 mb-3"
								style="display:none;font-size:13px;">
								<i class="fas fa-exclamation-circle me-1"></i>
								<span id="errorHorasMsg"></span>
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/horario/horarios}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
					</div>
				</div>
			</div>

			<!-- Calendario de ocupación -->
			<div class="col-md-7 col-lg-8">
				<div class="card shadow-sm h-100">
					<div class="card-header-custom">
						<i class="fas fa-calendar-week me-2"></i> Ocupación del espacio
					</div>
					<div class="card-body p-3" style="overflow-x:auto;">
						<div id="calendarioOcupacion">
							<p class="text-muted" style="font-size:13px;">
								<i class="fas fa-info-circle me-1"></i>
								Seleccione un espacio para ver su ocupación semanal.
							</p>
						</div>
					</div>
				</div>
			</div>

		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script th:inline="javascript">
		/*<![CDATA[*/
		var horariosOcupados = [];
		var excludeIds = new Set(/*[[${excludeIds}]]*/ []);
		/*[# th:each="h : ${todosHorarios}"]*/
		horariosOcupados.push({
			id:        /*[[${h.id}]]*/ 0,
			espacioId: /*[[${h.espacio.id}]]*/ 0,
			dia:       /*[[${h.diaSemana}]]*/ '',
			inicio:    /*[[${#strings.substring(h.horaInicio.toString(), 0, 5)}]]*/ '',
			fin:       /*[[${#strings.substring(h.horaFin.toString(), 0, 5)}]]*/ '',
			actividad: /*[[${h.actividad.nombre}]]*/ ''
		});
		/*[/]*/

		// ── Calendario ───────────────────────────────────────────────
		const DIAS       = ['LUNES','MARTES','MIERCOLES','JUEVES','VIERNES'];
		const DIAS_LABEL = {'LUNES':'Lun','MARTES':'Mar','MIERCOLES':'Mié','JUEVES':'Jue','VIERNES':'Vie'};
		const HORAS      = ['07:00','08:00','09:00','10:00','11:00','12:00','13:00','14:00','15:00','16:00','17:00'];

		function toMin(t) {
			if (!t) return 0;
			const [h, m] = t.split(':').map(Number);
			return h * 60 + m;
		}

		function getDiasSeleccionados() {
			const checks = document.querySelectorAll('input[name="dias"]:checked');
			if (checks.length > 0) return Array.from(checks).map(c => c.value);
			const sel = document.querySelector('select[name="dia"]');
			return sel && sel.value ? [sel.value] : [];
		}

		function renderCalendario() {
			const espacioId = document.getElementById('selectEspacio').value;
			const inicio    = document.getElementById('horaInicio').value;
			const fin       = document.getElementById('horaFin').value;
			const calDiv    = document.getElementById('calendarioOcupacion');
			const diasSel   = getDiasSeleccionados();

			if (!espacioId) {
				calDiv.innerHTML = '<p class="text-muted" style="font-size:13px;"><i class="fas fa-info-circle me-1"></i>Seleccione un espacio para ver su ocupación semanal.</p>';
				return;
			}

			const ocupados = horariosOcupados.filter(h => h.espacioId == espacioId && !excludeIds.has(h.id));

			let html = '<div class="table-responsive"><table class="table table-bordered cal-table mb-1"><thead><tr>';
			html += '<th class="hora-col"></th>';
			DIAS.forEach(d => { html += `<th>${DIAS_LABEL[d]}</th>`; });
			html += '</tr></thead><tbody>';

			HORAS.forEach(hora => {
				html += `<tr><td class="hora-col">${hora}</td>`;
				DIAS.forEach(dia => {
					const ocup = ocupados.find(h =>
						h.dia === dia &&
						toMin(hora) >= toMin(h.inicio) &&
						toMin(hora) < toMin(h.fin)
					);
					const esProp = diasSel.includes(dia) && inicio && fin &&
						toMin(hora) >= toMin(inicio) && toMin(hora) < toMin(fin);

					let cls = '', cont = '';
					if (ocup && esProp) {
						cls = 'cal-conflicto';
						cont = '<span class="cal-nombre" title="Conflicto">⚠</span>';
					} else if (ocup) {
						cls = 'cal-ocupado';
						cont = `<span class="cal-nombre" title="${ocup.actividad}">${ocup.actividad}</span>`;
					} else if (esProp) {
						cls = 'cal-propio';
					}
					html += `<td class="${cls}">${cont}</td>`;
				});
				html += '</tr>';
			});

			html += '</tbody></table></div>';
			html += '<div style="font-size:11px;margin-top:2px;">';
			html += '<span class="legend-box" style="background:#cfe2ff;"></span>Ocupado';
			if (inicio && fin && diasSel.length > 0) {
				html += ' &nbsp;<span class="legend-box" style="background:#d1e7dd;"></span>Selección';
				html += ' &nbsp;<span class="legend-box" style="background:#f8d7da;"></span>Conflicto';
			}
			html += '</div>';
			calDiv.innerHTML = html;
		}

		// ── Validación antes de submit ────────────────────────────────
		function validarForm() {
			const inicio   = document.getElementById('horaInicio').value;
			const fin      = document.getElementById('horaFin').value;
			const error    = document.getElementById('errorHoras');
			const errorMsg = document.getElementById('errorHorasMsg');
			if (inicio && fin) {
				if (inicio < '07:00' || inicio > '17:00') {
					errorMsg.textContent = 'La hora de inicio debe estar entre 07:00 y 17:00.';
					error.style.display = 'block';
					return false;
				}
				if (fin < '08:00' || fin > '18:00') {
					errorMsg.textContent = 'La hora de fin debe estar entre 08:00 y 18:00.';
					error.style.display = 'block';
					return false;
				}
				if (inicio >= fin) {
					errorMsg.textContent = 'La hora de inicio debe ser anterior a la hora de fin.';
					error.style.display = 'block';
					return false;
				}
				if (toMin(fin) - toMin(inicio) < 60) {
					errorMsg.textContent = 'La duración mínima del horario es de 1 hora.';
					error.style.display = 'block';
					return false;
				}
			}
			error.style.display = 'none';
			return true;
		}

		window.addEventListener('load', renderCalendario);
		/*]]>*/
	</script>
</body>

</html>
