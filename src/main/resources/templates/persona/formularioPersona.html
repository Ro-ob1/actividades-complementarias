<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Persona</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-user me-2"></i>
						<span th:text="${persona.id != null} ? 'Editar persona' : 'Registrar persona'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/persona/guardar}" method="post" th:object="${persona}">
							<input type="hidden" th:field="*{id}">
							<div th:if="${persona.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${persona.id}" readonly>
							</div>
							<div class="row g-3 mb-3">
								<div class="col-md-6">
									<label class="form-label">
										Nombre <span class="text-danger">*</span>
									</label>
									<input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej. Juan"
										required minlength="2" maxlength="80" pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣체횥챰횗\s]+"
										title="Solo letras y espacios"
										oninput="this.value = capitalizarPalabras(this.value)">
								</div>
								<div class="col-md-6">
									<label class="form-label">
										Apellido <span class="text-danger">*</span>
									</label>
									<input type="text" class="form-control" th:field="*{apellido}"
										placeholder="Ej. Garc챠a L처pez" required minlength="2" maxlength="80"
										pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣체횥챰횗\s]+" title="Solo letras y espacios"
										oninput="this.value = capitalizarPalabras(this.value)">
								</div>
							</div>
							<div class="mb-3">
								<label class="form-label">Email</label>
								<input type="email" class="form-control" th:field="*{email}"
									placeholder="Ej. juan@itch.edu.mx" maxlength="100">
								<div class="form-text text-muted" style="font-size:11px;">
									Opcional. Si se ingresa debe ser 첬nico.
								</div>
							</div>
							<div class="mb-3">
								<label class="form-label">Tel챕fono</label>
								<input type="tel" class="form-control" th:field="*{telefono}"
									placeholder="Ej. 7471234567" maxlength="10" pattern="[0-9]{10}"
									title="10 d챠gitos num챕ricos">
								<div class="form-text text-muted" style="font-size:11px;">
									10 d챠gitos sin espacios ni guiones.
								</div>
							</div>
							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/persona/personas}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
						<script>
							function capitalizarPalabras(texto) {
								return texto.replace(/(^|\s)\S/g, c => c.toUpperCase());
							}
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
