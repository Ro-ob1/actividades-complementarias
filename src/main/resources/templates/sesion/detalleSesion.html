<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Sesión</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-9">
				<div class="card shadow-sm mb-4">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-calendar-day me-2"></i>Detalle de sesión</span>
						<div class="d-flex gap-2">
							<a th:href="@{/sesion/asistencia/{id}(id=${sesion.id})}"
								class="btn btn-guardar btn-sm"
								th:if="${sesion.estatus == 'PROGRAMADA' or sesion.estatus == 'REALIZADA'}">
								<i class="bi bi-clipboard-check me-1"></i> Asistencia
							</a>
							<a th:href="@{/sesion/sesiones(idActividad=${sesion.horario.actividad.id})}"
								class="btn btn-light btn-sm">
								<i class="bi bi-arrow-left me-1"></i> Volver
							</a>
						</div>
					</div>
					<div class="card-body p-4">
						<div class="row g-3">
							<div class="col-md-6">
								<div class="detalle-row">
									<div class="detalle-label">Actividad</div>
									<div class="detalle-valor" th:text="${sesion.horario.actividad.nombre}"></div>
								</div>
								<div class="detalle-row">
									<div class="detalle-label">Número de sesión</div>
									<div class="detalle-valor" th:text="${sesion.numeroSesion}"></div>
								</div>
								<div class="detalle-row">
									<div class="detalle-label">Día</div>
									<div class="detalle-valor" th:text="${sesion.horario.diaSemana}"></div>
								</div>
								<div class="detalle-row">
									<div class="detalle-label">Fecha</div>
									<div class="detalle-valor" th:text="${sesion.fecha}"></div>
								</div>
							</div>
							<div class="col-md-6">
								<div class="detalle-row">
									<div class="detalle-label">Hora inicio</div>
									<div class="detalle-valor" th:text="${#strings.substring(sesion.horario.horaInicio.toString(), 0, 5)}"></div>
								</div>
								<div class="detalle-row">
									<div class="detalle-label">Hora fin</div>
									<div class="detalle-valor" th:text="${#strings.substring(sesion.horario.horaFin.toString(), 0, 5)}"></div>
								</div>
								<div class="detalle-row">
									<div class="detalle-label">Espacio</div>
									<div class="detalle-valor" th:text="${sesion.horario.espacio.nombre}"></div>
								</div>
								<div class="detalle-row">
									<div class="detalle-label">Estatus</div>
									<div class="detalle-valor">
										<span th:if="${sesion.estatus == 'PROGRAMADA'}" class="badge bg-primary">Programada</span>
										<span th:if="${sesion.estatus == 'REALIZADA'}" class="badge bg-success">Realizada</span>
										<span th:if="${sesion.estatus == 'CANCELADA'}" class="badge bg-danger">Cancelada</span>
									</div>
								</div>
							</div>
						</div>
						<div th:if="${sesion.observaciones != null and !#strings.isEmpty(sesion.observaciones)}"
							class="detalle-row mt-2">
							<div class="detalle-label">Observaciones</div>
							<div class="detalle-valor" th:text="${sesion.observaciones}"></div>
						</div>
					</div>
				</div>

				<div class="card shadow-sm" th:if="${not #lists.isEmpty(asistencias)}">
					<div class="card-header-custom">
						<i class="fas fa-clipboard-check me-2"></i>Lista de asistencia
					</div>
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>No. Control</th>
										<th>Nombre</th>
										<th class="text-center">Asistió</th>
										<th>Observaciones</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="a : ${asistencias}">
										<td th:text="${a.alumno.numControl}"></td>
										<td th:text="${a.alumno.persona.nombre + ' ' + a.alumno.persona.apellido}"></td>
										<td class="text-center">
											<i th:if="${a.asistio}" class="fas fa-check-circle text-success fs-5"></i>
											<i th:unless="${a.asistio}" class="fas fa-times-circle text-danger fs-5"></i>
										</td>
										<td th:text="${a.observaciones}"></td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
				</div>

				<div class="card shadow-sm" th:if="${#lists.isEmpty(asistencias)}">
					<div class="card-body text-center text-muted py-3">
						<i class="fas fa-info-circle me-1"></i> No se ha registrado asistencia para esta sesión.
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
