<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Reporte de Asistencia</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-10">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="bi bi-bar-chart me-2"></i>Reporte de asistencia</span>
						<a th:href="@{/sesion/sesiones(idActividad=${actividad.id})}"
							class="btn btn-light btn-sm">
							<i class="bi bi-arrow-left me-1"></i> Volver
						</a>
					</div>
					<div class="card-body">
						<!-- Info de la actividad -->
						<div class="p-3 mb-4 bg-light rounded">
							<div class="fw-semibold fs-6" th:text="${actividad.nombre}"></div>
							<div class="text-muted" style="font-size:13px;">
								Sesiones totales (sin canceladas): <strong th:text="${totalSesiones}"></strong>
							</div>
						</div>

						<div th:if="${#lists.isEmpty(reporte)}" class="text-center text-muted py-3">
							<i class="fas fa-info-circle me-1"></i> No hay alumnos inscritos con estatus ACEPTADA.
						</div>

						<div th:if="${not #lists.isEmpty(reporte)}" class="table-responsive">
							<table class="table table-bordered table-hover mb-0">
								<thead>
									<tr>
										<th>No. Control</th>
										<th>Nombre</th>
										<th class="text-center">Sesiones asistidas</th>
										<th class="text-center">Total sesiones</th>
										<th class="text-center">% Asistencia</th>
										<th class="text-center">Acreditado</th>
									</tr>
								</thead>
								<tbody>
									<tr th:each="r : ${reporte}"
										th:classappend="${r.acreditado} ? '' : 'table-danger'">
										<td th:text="${r.alumno.numControl}"></td>
										<td th:text="${r.alumno.persona.nombre + ' ' + r.alumno.persona.apellido}"></td>
										<td class="text-center" th:text="${r.sesionesAsistidas}"></td>
										<td class="text-center" th:text="${r.totalSesiones}"></td>
										<td class="text-center">
											<span th:text="${#numbers.formatDecimal(r.porcentaje, 1, 1) + '%'}"></span>
										</td>
										<td class="text-center">
											<span th:if="${r.acreditado}" class="badge bg-success">Sí</span>
											<span th:unless="${r.acreditado}" class="badge bg-danger">No</span>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
						<div class="text-muted mt-2" style="font-size:12px;">
							* Se requiere mínimo 80% de asistencia para acreditar.
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
