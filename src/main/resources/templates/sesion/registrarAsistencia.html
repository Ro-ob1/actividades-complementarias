<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Registrar Asistencia</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-10">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="bi bi-clipboard-check me-2"></i>Registrar asistencia</span>
						<a th:href="@{/sesion/sesiones(idActividad=${sesion.horario.actividad.id})}"
							class="btn btn-light btn-sm">
							<i class="bi bi-arrow-left me-1"></i> Volver
						</a>
					</div>
					<div class="card-body">
						<!-- Info de la sesión -->
						<div class="d-flex flex-wrap gap-3 mb-4 p-3 bg-light rounded">
							<div>
								<span class="text-muted" style="font-size:12px;">Actividad</span>
								<div class="fw-semibold" th:text="${sesion.horario.actividad.nombre}"></div>
							</div>
							<div>
								<span class="text-muted" style="font-size:12px;">Sesión</span>
								<div class="fw-semibold" th:text="${'#' + sesion.numeroSesion}"></div>
							</div>
							<div>
								<span class="text-muted" style="font-size:12px;">Día / Fecha</span>
								<div class="fw-semibold" th:text="${sesion.horario.diaSemana + ' ' + sesion.fecha}"></div>
							</div>
							<div>
								<span class="text-muted" style="font-size:12px;">Hora</span>
								<div class="fw-semibold"
									th:text="${#strings.substring(sesion.horario.horaInicio.toString(),0,5) + ' – ' + #strings.substring(sesion.horario.horaFin.toString(),0,5)}">
								</div>
							</div>
							<div>
								<span class="text-muted" style="font-size:12px;">Espacio</span>
								<div class="fw-semibold" th:text="${sesion.horario.espacio.nombre}"></div>
							</div>
						</div>

						<div th:if="${#lists.isEmpty(inscripciones)}" class="text-center text-muted py-3">
							<i class="fas fa-info-circle me-1"></i> No hay alumnos inscritos con estatus ACEPTADA.
						</div>

						<form th:if="${not #lists.isEmpty(inscripciones)}"
							th:action="@{/sesion/guardarAsistencia}" method="post">
							<input type="hidden" name="idSesion" th:value="${sesion.id}">

							<div class="d-flex justify-content-end mb-2 gap-2">
								<button type="button" class="btn btn-sm btn-outline-secondary"
									onclick="marcarTodos(true)">
									<i class="bi bi-check-all me-1"></i> Marcar todos
								</button>
								<button type="button" class="btn btn-sm btn-outline-secondary"
									onclick="marcarTodos(false)">
									<i class="bi bi-x me-1"></i> Desmarcar todos
								</button>
							</div>

							<div class="table-responsive">
								<table class="table table-bordered table-hover mb-0" id="tablaAsistencia">
									<thead>
										<tr>
											<th>No. Control</th>
											<th>Nombre</th>
											<th class="text-center" style="width:100px;">Asistió</th>
										</tr>
									</thead>
									<tbody>
										<tr th:each="insc : ${inscripciones}">
											<td th:text="${insc.alumno.numControl}"></td>
											<td th:text="${insc.alumno.persona.nombre + ' ' + insc.alumno.persona.apellido}"></td>
											<td class="text-center">
												<input type="checkbox" name="asistioIds"
													th:value="${insc.alumno.id}"
													class="form-check-input chk-asistio"
													style="width:20px;height:20px;"
													th:checked="${sesion.estatus == 'REALIZADA' and asistenciaMap.containsKey(insc.alumno.id) and asistenciaMap[insc.alumno.id].asistio}">
											</td>
										</tr>
									</tbody>
								</table>
							</div>

							<div class="d-flex gap-2 mt-3">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar asistencia
								</button>
								<a th:href="@{/sesion/sesiones(idActividad=${sesion.horario.actividad.id})}"
									class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script>
		function marcarTodos(valor) {
			document.querySelectorAll('.chk-asistio').forEach(c => c.checked = valor);
		}
	</script>
</body>

</html>
