<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Nivel</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-star me-2"></i>
						<span
							th:text="${nivel.id != null} ? 'Editar nivel de desempe챰o' : 'Registrar nivel de desempe챰o'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/nivelDesempenio/guardar}" method="post" th:object="${nivel}"
							onsubmit="return validarRangos()">
							<input type="hidden" th:field="*{id}">

							<div th:if="${nivel.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${nivel.id}" readonly>
							</div>

							<div class="mb-3">
								<label class="form-label">
									Nombre <span class="text-danger">*</span>
								</label>
								<input type="text" class="form-control" th:field="*{nombre}" placeholder="Ej. Excelente"
									required minlength="2" maxlength="50" pattern="[A-Za-z찼챕챠처첬횁횋횒횙횣체횥챰횗\s]+"
									title="Solo se permiten letras y espacios">
								<div class="form-text text-muted" style="font-size:11px;">
									Solo letras, sin n첬meros ni caracteres especiales.
								</div>
							</div>

							<div class="row g-3 mb-3">
								<div class="col-md-6">
									<label class="form-label">
										Rango m챠nimo <span class="text-danger">*</span>
									</label>
									<input type="number" step="0.01" class="form-control" th:field="*{rangoMin}"
										id="rangoMin" placeholder="Ej. 0.00" required min="0" max="100">
								</div>
								<div class="col-md-6">
									<label class="form-label">
										Rango m찼ximo <span class="text-danger">*</span>
									</label>
									<input type="number" step="0.01" class="form-control" th:field="*{rangoMax}"
										id="rangoMax" placeholder="Ej. 100.00" required min="0" max="100">
								</div>
							</div>

							<!-- Mensaje de error de rango -->
							<div id="errorRango" class="alert alert-danger py-2 mb-3"
								style="display:none;font-size:13px;">
								<i class="fas fa-exclamation-circle me-1"></i>
								El rango m챠nimo debe ser menor que el rango m찼ximo.
							</div>

							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/nivelDesempenio/niveles}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
	<script>
		function validarRangos() {
			const min = parseFloat(document.getElementById('rangoMin').value);
			const max = parseFloat(document.getElementById('rangoMax').value);
			const error = document.getElementById('errorRango');

			if (!isNaN(min) && !isNaN(max) && min >= max) {
				error.style.display = 'block';
				return false;
			}
			error.style.display = 'none';
			return true;
		}
	</script>
</body>

</html>
