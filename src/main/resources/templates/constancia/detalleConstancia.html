<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Constancia</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-certificate me-2"></i>Detalle de constancia</span>
						<a th:href="@{/constancia/constancias}" class="btn btn-light btn-sm">
							<i class="bi bi-arrow-left me-1"></i> Volver
						</a>
					</div>
					<div class="card-body p-4">
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${constancia.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Alumno</div>
							<div class="detalle-valor"
								th:text="${constancia.inscripcion.alumno.persona.nombre + ' ' + constancia.inscripcion.alumno.persona.apellido}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Actividad</div>
							<div class="detalle-valor" th:text="${constancia.inscripcion.actividad.nombre}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Semestre</div>
							<div class="detalle-valor"
								th:text="${constancia.semestre != null ? constancia.semestre.nombre : '—'}">
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Fecha de generación</div>
							<div class="detalle-valor" th:text="${constancia.fechaGeneracion}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Valor numérico (0–100)</div>
							<div class="detalle-valor" th:text="${constancia.valorNumerico}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Valor curricular (créditos)</div>
							<div class="detalle-valor" th:text="${constancia.valorCurricular}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Nivel de desempeño</div>
							<div class="detalle-valor">
								<span th:if="${constancia.nivel != null}"
									class="badge text-bg-primary" th:text="${constancia.nivel.nombre}"></span>
								<span th:unless="${constancia.nivel != null}">—</span>
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Estatus</div>
							<div class="detalle-valor">
								<span th:if="${constancia.estatus == 'GENERADA'}"
									class="badge text-bg-warning text-dark">Generada</span>
								<span th:if="${constancia.estatus == 'ENTREGADA'}"
									class="badge text-bg-success">Entregada</span>
								<span th:if="${constancia.estatus == 'CANCELADA'}"
									class="badge text-bg-danger">Cancelada</span>
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">PDF</div>
							<div class="detalle-valor">
								<a th:href="@{/constancia/pdf/{id}(id=${constancia.id})}"
									target="_blank" class="btn btn-sm btn-outline-secondary">
									<i class="fas fa-file-pdf me-1"></i> Descargar PDF
								</a>
							</div>
						</div>
						<div class="mt-4">
							<a th:href="@{/constancia/editar/{id}(id=${constancia.id})}"
								class="btn btn-guardar btn-sm">
								<i class="bi bi-pencil me-1"></i> Editar
							</a>
							<a th:href="@{/constancia/constancias}" class="btn btn-outline-secondary btn-sm ms-2">
								<i class="bi bi-arrow-left me-1"></i> Regresar
							</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
