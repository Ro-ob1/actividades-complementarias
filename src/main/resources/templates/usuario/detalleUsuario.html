<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Detalle Usuario</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-5">
				<div class="card shadow-sm">
					<div class="card-header-custom d-flex align-items-center justify-content-between">
						<span><i class="fas fa-key me-2"></i>Detalle del usuario</span>
						<a th:href="@{/usuario/usuarios}" class="btn btn-light btn-sm"><i
								class="bi bi-arrow-left me-1"></i> Volver</a>
					</div>
					<div class="card-body p-4">
						<div class="d-flex align-items-center gap-3 mb-4">
							<div class="avatar-circle" th:text="${#strings.substring(usuario.persona.nombre,0,1)}">
							</div>
							<div>
								<div style="font-size:17px;font-weight:700;"
									th:text="${usuario.persona.nombre + ' ' + usuario.persona.apellido}"></div>
								<div style="font-size:12px;color:var(--tecnm-gris);" th:text="${usuario.username}">
								</div>
							</div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">ID</div>
							<div class="detalle-valor" th:text="${usuario.id}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Username</div>
							<div class="detalle-valor" th:text="${usuario.username}"></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Rol</div>
							<div class="detalle-valor"><span class="badge text-bg-primary"
									th:text="${usuario.rol}"></span></div>
						</div>
						<div class="detalle-row">
							<div class="detalle-label">Estatus</div>
							<div class="detalle-valor">
								<span th:if="${usuario.activo == 1}" class="badge text-bg-success">Activo</span>
								<span th:unless="${usuario.activo == 1}" class="badge text-bg-danger">Inactivo</span>
							</div>
						</div>
						<div class="mt-4">
							<a th:href="@{/usuario/editar/{id}(id=${usuario.id})}" class="btn btn-guardar btn-sm"><i
									class="bi bi-pencil me-1"></i> Editar</a>
							<a th:href="@{/usuario/usuarios}" class="btn btn-outline-secondary btn-sm ms-2"><i
									class="bi bi-arrow-left me-1"></i> Regresar</a>
						</div>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
