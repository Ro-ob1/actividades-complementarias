<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Usuario</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-key me-2"></i>
						<span th:text="${usuario.id != null} ? 'Editar usuario' : 'Registrar usuario'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/usuario/guardar}" method="post" th:object="${usuario}">
							<input type="hidden" th:field="*{id}">

							<div th:if="${usuario.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${usuario.id}" readonly>
							</div>

							<!-- Nuevo: autocomplete de personas -->
							<div th:if="${usuario.id == null}" class="mb-3">
								<label class="form-label">
									Persona <span class="text-danger">*</span>
								</label>
								<div class="position-relative">
									<input type="text" id="inputPersona" class="form-control"
										placeholder="Escriba nombre o apellido..." autocomplete="off">
									<ul id="sugerenciasPersona" class="list-group position-absolute w-100 shadow-sm"
										style="z-index:1000;max-height:220px;overflow-y:auto;display:none;top:100%;left:0;font-size:13px;"></ul>
								</div>
								<input type="hidden" name="persona.id" id="personaIdHidden" required>
								<div class="form-text" id="personaSeleccionadaInfo" style="font-size:11px;"></div>
							</div>

							<!-- Edición: persona fija, no editable -->
							<div th:if="${usuario.id != null}" class="mb-3">
								<label class="form-label">Persona</label>
								<input type="text" class="form-control"
									th:value="${usuario.persona.nombre + ' ' + usuario.persona.apellido}"
									readonly style="background:#f4f6f8;">
								<input type="hidden" name="persona.id" th:value="${usuario.persona.id}">
							</div>

							<div class="mb-3">
								<label class="form-label">Rol asignado</label>
								<input type="text" class="form-control" id="rolInfo"
									th:value="${rolAmigable != null ? rolAmigable : 'Se detecta automáticamente'}"
									readonly style="background:#f4f6f8;color:var(--tecnm-azul);font-weight:600;">
								<div class="form-text text-muted" style="font-size:11px;">
									Se asigna automáticamente según el tipo de persona registrada.
								</div>
							</div>

							<div class="mb-3">
								<label class="form-label">
									Usuario <span class="text-danger">*</span>
								</label>
								<input type="text" class="form-control" th:field="*{username}" placeholder="Ej. antonio"
									required minlength="3" maxlength="30" pattern="[a-zA-Z0-9_]+"
									title="Solo letras, números y guión bajo"
									oninput="this.value = this.value.toLowerCase()">
							</div>

							<div class="mb-3">
								<label class="form-label">
									Contraseña
									<span th:if="${usuario.id == null}" class="text-danger">*</span>
									<small th:if="${usuario.id != null}" class="text-muted">(dejar vacío para no
										cambiar)</small>
								</label>
								<input type="password" class="form-control" th:field="*{password}"
									th:required="${usuario.id == null}" minlength="6" maxlength="50"
									placeholder="Mínimo 6 caracteres">
							</div>

							<div th:if="${usuario.id != null and usuario.rol != 'ROLE_ADMIN'}" class="mb-3">
								<label class="form-label">Activo</label>
								<div class="d-flex gap-3">
									<div class="form-check">
										<input class="form-check-input" type="radio"
										       name="activo" value="1"
										       th:checked="${usuario.activo == 1}">
										<label class="form-check-label">Sí</label>
									</div>
									<div class="form-check">
										<input class="form-check-input" type="radio"
										       name="activo" value="0"
										       th:checked="${usuario.activo == 0}">
										<label class="form-check-label">No</label>
									</div>
								</div>
							</div>

							<div class="d-flex gap-2 mt-3">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/usuario/usuarios}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
						
						<script th:inline="javascript">
							/*<![CDATA[*/
							var rolesPersona = /*[[${rolesPorPersona}]]*/ {};

							// Construir array de personas desde Thymeleaf
							var todasPersonas = [];
							/*[# th:each="p : ${personas}"]*/
							todasPersonas.push({
								id: String(/*[[${p.id}]]*/0),
								texto: /*[[${p.nombre + ' ' + p.apellido}]]*/ ''
							});
							/*[/]*/

							// --- Autocomplete de persona ---
							(function () {
								const input = document.getElementById('inputPersona');
								const lista = document.getElementById('sugerenciasPersona');
								const hidden = document.getElementById('personaIdHidden');
								const info  = document.getElementById('personaSeleccionadaInfo');
								if (!input) return;

								input.addEventListener('input', function () {
									const q = this.value.toLowerCase().trim();
									hidden.value = '';
									if (info) info.textContent = '';

									if (q.length < 1) { lista.style.display = 'none'; return; }

									const coincidentes = todasPersonas.filter(p =>
										p.texto.toLowerCase().includes(q)
									).slice(0, 10);

									lista.innerHTML = '';
									if (!coincidentes.length) { lista.style.display = 'none'; return; }

									coincidentes.forEach(p => {
										const li = document.createElement('li');
										li.className = 'list-group-item list-group-item-action py-1 px-2';
										li.style.cursor = 'pointer';
										li.textContent = p.texto;
										li.addEventListener('mousedown', () => {
											input.value = p.texto;
											hidden.value = p.id;
											lista.style.display = 'none';
											mostrarRolPorId(p.id);
										});
										lista.appendChild(li);
									});
									lista.style.display = 'block';
								});

								input.addEventListener('blur', () =>
									setTimeout(() => lista.style.display = 'none', 150)
								);
							})();

							// --- Mostrar rol ---
							function mostrarRolPorId(personaId) {
								const rolInput = document.getElementById('rolInfo');
								const info = document.getElementById('personaSeleccionadaInfo');
								const colores = {
									'Administrador': '#dc3545',
									'Instructor':    '#0d6efd',
									'Encargado':     '#198754',
									'Alumno':        '#6c757d'
								};
								if (rolesPersona[personaId]) {
									const rol = rolesPersona[personaId];
									rolInput.value = rol;
									rolInput.style.color = colores[rol] || 'var(--tecnm-azul)';
									if (info) { info.textContent = ''; info.style.color = ''; }
								} else {
									rolInput.value = 'No registrada como alumno/instructor/encargado';
									rolInput.style.color = '#dc3545';
									if (info) { info.textContent = '⚠ Esta persona no podrá guardarse como usuario.'; info.style.color = '#dc3545'; }
								}
							}
							/*]]>*/
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
