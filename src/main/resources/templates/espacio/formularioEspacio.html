<!DOCTYPE html>
<html xmlns:th="https://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<title>Formulario Espacio</title>
	<link href="/webjars/bootstrap/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" th:href="@{/css/estilos.css}">
</head>

<body class="d-flex flex-column min-vh-100">
	<header th:replace="~{fragmento/fragmento :: main-header}"></header>
	<main class="container flex-grow-1 my-4">
		<div class="row justify-content-center">
			<div class="col-md-6">
				<div class="card shadow-sm">
					<div class="card-header-custom">
						<i class="fas fa-map-marker-alt me-2"></i>
						<span th:text="${espacio.id != null} ? 'Editar espacio' : 'Registrar espacio'"></span>
					</div>
					<div class="card-body p-4">
						<form th:action="@{/espacio/guardar}" method="post" th:object="${espacio}">
							<input type="hidden" th:field="*{id}">
							<div th:if="${espacio.id != null}" class="mb-3">
								<label class="form-label">ID</label>
								<input type="text" class="form-control" th:value="${espacio.id}" readonly>
							</div>
							<input type="text" class="form-control" th:field="*{nombre}"
								placeholder="Ej. Edificio S - S1, Cancha De Fútbol" required minlength="2"
								maxlength="80" pattern="[A-Za-z0-9áéíóúÁÉÍÓÚüÜñÑ\s\-]+"
								title="Letras, números, espacios y guiones permitidos"
								oninput="this.value = capitalizarPalabras(this.value)">
							<div class="form-text text-muted" style="font-size:11px;">
								Letras, números, guiones y espacios.
							</div>
							<input type="text" class="form-control" th:field="*{descripcion}"
								placeholder="Ej. Aula 1 primer piso edificio R" maxlength="150"
								pattern="[A-Za-z0-9áéíóúÁÉÍÓÚüÜñÑ\s\-,.]+"
								oninput="this.value = capitalizarPalabras(this.value)">
							<div class="d-flex gap-2">
								<button type="submit" class="btn btn-guardar">
									<i class="fas fa-save me-1"></i> Guardar
								</button>
								<a th:href="@{/espacio/espacios}" class="btn btn-outline-secondary">
									<i class="fas fa-times me-1"></i> Cancelar
								</a>
							</div>
						</form>
						<script>
							function capitalizarPalabras(texto) {
								return texto.replace(/\b\w/g, c => c.toUpperCase());
							}
						</script>
					</div>
				</div>
			</div>
		</div>
	</main>
	<footer th:replace="~{fragmento/fragmento :: footer}"></footer>
	<script src="/webjars/bootstrap/js/bootstrap.bundle.min.js"></script>
</body>

</html>
