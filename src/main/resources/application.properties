spring.application.name=ActividadesComplementarias
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/actividadescomplementarias}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:659411}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

app.upload.dir=${UPLOAD_DIR:/uploads}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

spring.thymeleaf.cache=false
spring.mvc.format.date=yyyy-MM-dd
spring.mvc.format.time=HH:mm

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB